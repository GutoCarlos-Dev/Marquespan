<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Cadastro Carregamento - Marquespan</title>
  <link rel="icon" href="img/logonavegador.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/index.css"> 
  <link rel="stylesheet" href="css/menu.css"> 
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/cadastro-carregamento.css">
</head>
<body>
  <div id="menu-container"></div>

  <!-- 🧱 Conteúdo principal -->
  <div class="main-content">
    <header class="header glass-header"><h1><i class="fas fa-truck-loading"></i> Cadastro Carregamento</h1></header>

    <section id="itens" class="glass-panel">
      <h3><i class="fas fa-boxes"></i> Itens</h3>
      
      <div class="form-actions" style="justify-content: flex-start; margin-bottom: 15px;">
        <button type="button" id="btnIncluirItem" class="btn-glass btn-blue">➕ Incluir Item</button>
      </div>
      <form id="formItem">
        <div class="form-grid cliente-form-grid">
          <div class="form-group">
            <label for="codigoItem">Código:</label>
            <input type="text" id="codigoItem" placeholder="Código do Item" required disabled class="glass-input">
          </div>
          <div class="form-group">
            <label for="nomeItem">Nome:</label>
            <input type="text" id="nomeItem" placeholder="Nome do Item" required disabled class="glass-input">
          </div>
          <div class="form-group">
            <label for="tipoItem">Tipo:</label>
            <select id="tipoItem" required disabled class="glass-input">
              <option value="" disabled selected>Selecione o tipo</option>
              <option value="Novo">Novo</option>
              <option value="Usado">Usado</option>
            </select>
          </div>
        </div>
        <div class="form-actions" style="margin-top: 15px;">
          <button type="submit" id="btnSalvarItem" disabled class="btn-glass btn-green">✅ Salvar Item</button>
        </div>
      </form>
         
      <div class="table-responsive">
        <table id="tabelaItens" class="glass-table data-grid">
          <thead>
            <tr>
              <th>Código</th>
              <th>Nome</th>
              <th>Tipo</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="corpoTabelaItens"></tbody>
        </table>
      </div>
    </section>

    <section id="clientes" class="glass-panel">
      <div class="panel-title-row">
        <h3><i class="fas fa-users"></i> Clientes (<span id="contadorClientesAtivos">0</span> ativos)</h3>
        <button type="button" id="btnAbrirModalCliente" class="btn-glass btn-blue">Incluir Cliente</button>
      </div>
      <div class="grid-toolbar">
        <div class="form-group search-group">
          <label for="buscaClientesCarregamento">Buscar cliente</label>
          <input type="search" id="buscaClientesCarregamento" placeholder="Codigo, nome, fantasia ou CPF/CNPJ" class="glass-input">
        </div>
      </div>
      <form id="formCliente" class="modal-overlay hidden" aria-hidden="true">
        <div class="modal-card">
          <div class="modal-header">
            <h3 id="tituloModalCliente"><i class="fas fa-user-plus"></i> Cadastro de Cliente</h3>
            <button type="button" id="btnFecharModalCliente" class="btn-icon delete" title="Fechar"><i class="fas fa-times"></i></button>
          </div>
        <div class="form-grid">
          <div class="form-group">
            <label for="clienteCodigo">Codigo</label>
            <input type="text" id="clienteCodigo" name="codigo" class="glass-input" required readonly>
          </div>
          <div class="form-group">
            <label for="clienteFantasia">Fantasia</label>
            <input type="text" id="clienteFantasia" name="fantasia" class="glass-input">
          </div>
          <div class="form-group">
            <label for="clienteNome">Nome</label>
            <input type="text" id="clienteNome" name="nome" class="glass-input">
          </div>
          <div class="form-group">
            <label for="clienteTipoPessoa">Fis/Jur</label>
            <input type="text" id="clienteTipoPessoa" name="tipo_pessoa" class="glass-input" maxlength="1">
          </div>
          <div class="form-group">
            <label for="clienteUf">UF</label>
            <input type="text" id="clienteUf" name="uf" class="glass-input" maxlength="2">
          </div>
          <div class="form-group">
            <label for="clienteMunicipio">Municipio</label>
            <input type="text" id="clienteMunicipio" name="municipio" class="glass-input">
          </div>
          <div class="form-group cliente-field-wide">
            <label for="clienteEndereco">Endereco</label>
            <input type="text" id="clienteEndereco" name="endereco" class="glass-input">
          </div>
          <div class="form-group cliente-field-wide">
            <label for="clienteGeolocalizacao">Geolocalizacao</label>
            <input type="text" id="clienteGeolocalizacao" name="geolocalizacao" class="glass-input" placeholder="-23.330692, -47.851799" title="Informe latitude e longitude separadas por virgula. Exemplo: -23.330692, -47.851799">
          </div>
          <div class="form-group">
            <label for="clienteBairro">Bairro</label>
            <input type="text" id="clienteBairro" name="bairro" class="glass-input">
          </div>
          <div class="form-group">
            <label for="clienteCep">CEP</label>
            <input type="text" id="clienteCep" name="cep" class="glass-input">
          </div>
          <div class="form-group cliente-field-wide">
            <label for="clienteEmail">Email</label>
            <input type="email" id="clienteEmail" name="email" class="glass-input">
          </div>
          <div class="form-group">
            <label for="clienteCnpjCpf">CNPJ/CPF</label>
            <input type="text" id="clienteCnpjCpf" name="cnpj_cpf" class="glass-input">
          </div>
          <div class="form-group">
            <label for="clienteIeRg">IE/RG</label>
            <input type="text" id="clienteIeRg" name="ie_rg" class="glass-input">
          </div>
          <div class="form-group">
            <label for="clienteCondPagto">Cond Pagto</label>
            <input type="text" id="clienteCondPagto" name="cond_pagto" class="glass-input">
          </div>
          <div class="form-group">
            <label for="clienteFormaCob">Forma Cob</label>
            <input type="text" id="clienteFormaCob" name="forma_cob" class="glass-input">
          </div>
          <div class="form-group">
            <label for="clienteAtivo">Ativo</label>
            <select id="clienteAtivo" name="ativo" class="glass-input">
              <option value="A">A - Ativo</option>
              <option value="I">I - Inativo</option>
            </select>
          </div>
          <div class="form-group">
            <label for="clienteSupervisor">Supervisor</label>
            <input type="text" id="clienteSupervisor" name="supervisor" class="glass-input">
          </div>
          <div class="form-group">
            <label for="clienteRota">Rota</label>
            <input type="text" id="clienteRota" name="rota" class="glass-input">
          </div>
          <div class="form-group">
            <label for="clienteConsultor">Consultor</label>
            <input type="text" id="clienteConsultor" name="consultor" class="glass-input">
          </div>
          <div class="form-group">
            <label for="clienteTabelaPreco">Tab Prc</label>
            <input type="text" id="clienteTabelaPreco" name="tabela_preco" class="glass-input">
          </div>
          <div class="form-group">
            <label for="clienteCategoria">Categoria</label>
            <input type="text" id="clienteCategoria" name="categoria" class="glass-input">
          </div>
        </div>
        <div class="form-actions-inline modal-actions">
          <button type="button" id="btnCancelarCliente" class="btn-glass btn-red">Cancelar</button>
          <button type="button" id="btnClearClienteForm" class="btn-glass btn-secondary">
            <i class="fas fa-eraser"></i> Limpar
          </button>
          <button type="submit" id="btnSalvarCliente" class="btn-glass btn-green">
            <i class="fas fa-save"></i> Salvar Registro
          </button>
        </div>
        </div>
      </form>
      <div class="table-responsive">
        <table id="tabelaClientes" class="glass-table data-grid">
          <thead>
            <tr>
              <th>Código</th>
              <th>Nome</th>
              <th>Fantasia</th>
              <th>CPF/CNPJ</th>
              <th>Cidade</th>
              <th>Estado</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="corpoTabelaClientes"></tbody>
        </table>
      </div>
    </section>

    <section id="motoristas" class="glass-panel">
      <h3><i class="fas fa-truck-moving"></i> Motoristas</h3>
      <form id="formMotorista">
        <div class="form-grid">
          <div class="form-group">
            <label for="nomeMotorista">Nome:</label>
            <input type="text" id="nomeMotorista" placeholder="Nome do Motorista" required class="glass-input">
          </div>
          <div class="form-group">
            <label for="nomeCompletoMotorista">Nome Completo:</label>
            <input type="text" id="nomeCompletoMotorista" placeholder="Nome Completo do Motorista" class="glass-input">
          </div>
        </div>
        <div class="form-actions" style="margin-top: 15px;">
          <button type="submit" id="btnSalvarMotorista" class="btn-glass btn-green">✅ Salvar Motorista</button>
        </div>
      </form>
      <div class="table-responsive">
        <table id="tabelaMotoristas" class="glass-table data-grid">
          <thead>
            <tr>
              <th>Nome</th>
              <th>Nome Completo</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="corpoTabelaMotoristas"></tbody>
        </table>
      </div>
    </section>

    <footer class="footer">
      &copy; 2026 GTSYSTEM - Marquespan. Todos os direitos reservados.
    </footer>
  </div>

  <!-- 🚀 Scripts -->
  <script type="module" src="script/menu.js"></script>
  <script type="module" src="./script/auth-guard.js"></script>

  <script type="module">
    import { carregarItens, salvarItem, editarItem, excluirItem, incluirItem, carregarClientes, salvarCliente, editarCliente, excluirCliente, abrirModalCliente, fecharModalCliente, filtrarClientes, carregarMotoristas, salvarMotorista, editarMotorista, excluirMotorista } from './script/cadastro-carregamento.js?v=20260618-2';

    window.addEventListener('DOMContentLoaded', () => {
      document.getElementById('formItem').addEventListener('submit', salvarItem);
      document.getElementById('formCliente').addEventListener('submit', salvarCliente);
      document.getElementById('btnAbrirModalCliente').addEventListener('click', () => abrirModalCliente());
      document.getElementById('btnFecharModalCliente').addEventListener('click', fecharModalCliente);
      document.getElementById('btnCancelarCliente').addEventListener('click', fecharModalCliente);
      document.getElementById('buscaClientesCarregamento').addEventListener('input', filtrarClientes);
      document.getElementById('formCliente').addEventListener('click', (event) => {
        if (event.target.id === 'formCliente') fecharModalCliente();
      });
      document.getElementById('btnIncluirItem').addEventListener('click', incluirItem);
      window.editarItem = editarItem;
      window.excluirItem = excluirItem;
      window.editarCliente = editarCliente;
      window.excluirCliente = excluirCliente;
      document.getElementById('formMotorista').addEventListener('submit', salvarMotorista);
      window.editarMotorista = editarMotorista;
      window.excluirMotorista = excluirMotorista;

      carregarItens();
      carregarClientes();
      carregarMotoristas();
    });
  </script>
</body>
</html>
