<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Postos no Mapa - Marquespan</title>
  <link rel="icon" href="img/logonavegador.png" type="image/png">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/postos-mapa.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
  <main class="postos-mapa-page">
    <aside class="postos-mapa-sidebar">
      <header class="postos-mapa-header">
        <h1><i class="fas fa-map-location-dot"></i> Postos no Mapa</h1>
        <p id="postosMapaStatus">Carregando postos...</p>
      </header>

      <section class="postos-mapa-card">
        <h2>Resumo</h2>
        <div class="postos-mapa-kpis">
          <div><span id="mapaTotalPostos">0</span><small>postos</small></div>
          <div><span id="mapaTotalLocalizados">0</span><small>localizados</small></div>
        </div>
      </section>

      <section class="postos-mapa-card">
        <div class="postos-mapa-card-header">
          <h2>Nao localizados</h2>
          <button type="button" id="btnExportarPendentesPostos" class="postos-mapa-btn-exportar" hidden>
            <i class="fas fa-file-excel"></i> Exportar XLSX
          </button>
        </div>
        <div id="postosMapaPendentes" class="postos-mapa-pendentes">Nenhum.</div>
      </section>
    </aside>

    <section class="postos-mapa-content">
      <div id="postosMapa"></div>
    </section>
  </main>

  <script type="module" src="script/postos-mapa.js"></script>
</body>
</html>
