<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lavagem Mobile - Marquespan</title>
    <link rel="stylesheet" href="css/mobile-lavagem.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Estilo para Veículos Internados - AZUL */
        .badge-internado {
            background-color: #007bff !important;
            color: white !important;
        }
        /* Desabilita interação com cards internados */
        .card-internado {
            opacity: 0.8;
            pointer-events: none; /* Impede cliques */
        }
        /* Estilo para PENDENTE - VERMELHO */
        .badge-pendente {
            background-color: #dc3545 !important;
            color: white !important;
        }
        /* Estilo para AGENDADO - AMARELO */
        .badge-agendado {
            background-color: #ffc107 !important;
            color: #212529 !important;
        }
        /* Estilo para PULAR_LAVAGEM - CINZA */
        .badge-pular {
            background-color: #6c757d !important;
            color: white !important;
        }
        .card-pular {
            opacity: 0.8;
            pointer-events: none; /* Impede cliques */
        }
    </style>
</head>
<body>
    <header class="mobile-header">
        <div class="header-content">
            <img src="logo.png" alt="Logo" class="mobile-logo">
            <h1>Lavagem</h1>
        </div>
        <a href="lavagem.html" class="btn-desktop-link" title="Voltar para Desktop"><i class="fas fa-desktop"></i></a>
    </header>

    <div class="mobile-container">
        <!-- Tela 1: Seleção de Lista -->
        <div id="screenListas">
            <h3 class="section-title">Listas Abertas</h3>
            <div id="listaDeListas" class="cards-container">
                <div class="loading">Carregando listas...</div>
            </div>
        </div>

        <!-- Tela 2: Itens da Lista -->
        <div id="screenItens" class="hidden">
            <div class="list-header">
                <button id="btnVoltar" class="btn-back"><i class="fas fa-arrow-left"></i> Voltar</button>
                <h3 id="tituloListaAtual">Lista Selecionada</h3>
            </div>
            
            <div class="search-bar">
                <input type="text" id="searchPlacaMobile" placeholder="Buscar placa...">
                <i class="fas fa-search"></i>
            </div>

            <div class="filter-tabs">
                <button class="tab active" data-filter="TODOS">Todos <small id="countTodos">(0)</small></button>
                <button class="tab" data-filter="PENDENTE">Pendentes <small id="countPendentes">(0)</small></button>
                <button class="tab" data-filter="REALIZADO">Feitos <small id="countRealizados">(0)</small></button>
                <button class="tab" data-filter="AGENDADO">Agendado <small id="countAgendados">(0)</small></button>
                <button class="tab" data-filter="INTERNADO">Internado <small id="countInternados">(0)</small></button>
            </div>

            <div id="listaDeItens" class="cards-container">
                <!-- Cards carregados via JS -->
            </div>
        </div>
    </div>

    <!-- Modal de Ação -->
    <div id="modalAcaoMobile" class="mobile-modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalPlacaVeiculo">ABC-1234</h3>
                <button class="close-modal">&times;</button>
            </div>
            <div class="modal-body">
                <p id="modalModeloVeiculo" class="veiculo-modelo">Modelo do Veículo</p>
                
                <div class="form-group">
                    <label>Tipo de Lavagem</label>
                    <div class="radio-group" id="radioGroupTipos">
                        <!-- Opções geradas via JS -->
                    </div>
                </div>

                <button id="btnSalvarLavagem" class="btn-block btn-primary">
                    <i class="fas fa-check"></i> Confirmar Lavagem
                </button>
            </div>
        </div>
    </div>

    <script type="module" src="script/mobile-lavagem.js"></script>
    <script>
        // Script auxiliar para aplicar estilos e bloqueios a veículos INTERNADOS
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('listaDeItens');
            if (container) {
                // Observa mudanças na lista para aplicar regras assim que os itens forem carregados
                const observer = new MutationObserver(() => {
                    // Busca badges ou elementos que contenham o texto INTERNADO
                    const badges = container.querySelectorAll('.badge, span');
                    badges.forEach(badge => {
                        const texto = badge.textContent.trim();
                        const card = badge.closest('.card-veiculo') || badge.closest('div[class*="card"]');

                        if (texto === 'INTERNADO') {
                            badge.classList.add('badge-internado');
                            if (card) {
                                card.classList.add('card-internado');
                                card.style.borderLeft = '5px solid #007bff';
                            }
                        } else if (texto === 'PENDENTE') {
                            badge.classList.add('badge-pendente');
                            if (card) card.style.borderLeft = '5px solid #dc3545';
                        } else if (texto === 'AGENDADO') {
                            badge.classList.add('badge-agendado');
                            if (card) card.style.borderLeft = '5px solid #ffc107';
                        } else if (texto === 'PULAR_LAVAGEM') {
                            badge.classList.add('badge-pular');
                            if (card) {
                                card.classList.add('card-pular');
                                card.style.borderLeft = '5px solid #6c757d';
                            }
                        }
                    });
                });
                
                observer.observe(container, { childList: true, subtree: true });
            }
        });
    </script>
</body>
</html>
