<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thermoking - Marquespan</title>
  <!-- Fundação e Layout Moderno -->
  <link rel="stylesheet" href="css/index.css" />
  <link rel="stylesheet" href="css/thermoking.css" />
  <link rel="icon" href="logo.png" type="image/png">
  <!-- Ícones Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="icon" href="logo.png" type="image/png">
  <!-- Biblioteca para ler arquivos Excel -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <!-- Biblioteca para gerar PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <!-- Biblioteca para gerar QR Code -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
  <div class="container">
    <!-- Container para injeção do Menu Lateral -->
    <div id="menu-container"></div>

    <!-- 🧩 Conteúdo principal -->
    <div class="main-content">
      <header class="header glass-header">
        <h1><i class="fas fa-snowflake"></i> Gestão de Thermoking</h1>
      </header>

    <div class="top-grid">
      <!-- Card 1: Filtros de Busca -->
      <section class="glass-panel">
        <h3><i class="fas fa-filter"></i> Filtros de Busca</h3>
        <div class="filtros-wrapper-cards">
          <!-- Grupo 2: Status e Filial -->
          <div class="glass-panel-inner">
            <h4><i class="fas fa-info-circle"></i> Status e Filial</h4>
            <div class="filtros-container">
              <div class="form-group-filter">
                <label for="campo-filial">Filial</label>
                <select id="campo-filial" class="glass-input">
                  <option value="">Todas</option>
                </select>
              </div>
              <div class="form-group-filter">
                <label for="campo-situacao">Situação</label>
                <select id="campo-situacao" class="glass-input">
                  <option value="">Todos</option>
                  <option value="Ativo">ATIVO</option>
                  <option value="Inativo">INATIVO</option>
                  <option value="Recuperado Peças">RECUPERADO PEÇAS</option>
                </select>
              </div>
            </div>
          </div>

          <!-- Grupo 1: Equipamento -->
          <div class="glass-panel-inner">
            <h4><i class="fas fa-info-circle"></i> Equipamento</h4>
            <div class="filtros-container">
              <div class="form-group-filter">
                <label for="campo-serie">Nº de Série</label>
                <input type="text" id="campo-serie" class="glass-input" placeholder="Buscar Série..." />
              </div>
              <div class="form-group-filter">
                <label for="campo-modelo">Modelo</label>
                <input type="text" id="campo-modelo" class="glass-input" placeholder="Ex: T-880" />
              </div>
            </div>
          </div>

        </div>
      </section>
      <!-- Card 2: Ações -->
      <section class="glass-panel acoes-panel">
        <h3><i class="fas fa-cogs"></i> Ações</h3>
        <div class="acoes-grid">
          <button type="button" id="btn-buscar" class="btn-glass btn-blue"><i class="fas fa-search"></i> Filtrar</button>
          <button type="button" id="btn-novo-tk" class="btn-glass btn-green"><i class="fas fa-plus"></i> Novo Cadastro</button>
          <button type="button" id="btn-exportar-xls" class="btn-glass btn-purple"><i class="fas fa-file-excel"></i> Exportar</button>
        </div>
      </section>
    </div>

    <div class="glass-panel">
      <div class="panel-header">
        <h3><i class="fas fa-list"></i> Equipamentos Cadastrados</h3>
        <span id="grid-records-count" class="count-badge"></span>
      </div>
      <div class="table-responsive table-container">
        <table class="glass-table">
          <thead>
            <tr>
              <th data-sort="filial" class="sortable">FILIAL <i class="fas fa-sort"></i></th>
              <th data-sort="numero_serie" class="sortable">Nº SÉRIE <i class="fas fa-sort"></i></th>
              <th data-sort="modelo" class="sortable">MODELO <i class="fas fa-sort"></i></th>
              <th data-sort="ano" class="sortable">ANO <i class="fas fa-sort"></i></th>
              <th data-sort="placa_vinculada" class="sortable">PLACA <i class="fas fa-sort"></i></th>
              <th data-sort="status" class="sortable">SITUAÇÃO <i class="fas fa-sort"></i></th>
              <th>AÇÕES</th>
            </tr>
          </thead>
          <tbody id="grid-tk-body"></tbody>
        </table>
      </div>
    </div>
    </div>
  </div>

  <!-- 🦶 Rodapé -->
  <footer class="footer">
    &copy; 2025 GTSYSTEM - Marquespan. Todos os direitos reservados.
  </footer>
  <!-- 🚀 Scripts -->
  <!-- Modal para Cadastro/Edição de Thermoking -->
  <div id="modalTk" class="modal-backdrop hidden">
    <div class="glass-modal" style="max-width: 750px;">
        <div class="modal-header">
            <h3 id="modalTitle">Novo Equipamento</h3>
            <button class="close-button" id="btnCloseModalTk">&times;</button>
        </div>
        <div class="modal-body">
            <form id="formTk">
                <input type="hidden" id="tkId">
                <div class="form-row">
                    <div class="form-group">
                        <label for="tkFilial">Filial *</label>
                        <select id="tkFilial" class="glass-input" required>
                            <option value="">Selecione</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="tkSerie">Número de Série *</label>
                        <input type="text" id="tkSerie" class="glass-input" required placeholder="Digite o S/N">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="tkModelo">Modelo *</label>
                        <input type="text" id="tkModelo" class="glass-input" required placeholder="Ex: T-880R">
                    </div>
                    <div class="form-group">
                        <label for="tkAno">Ano</label>
                        <input type="number" id="tkAno" class="glass-input" placeholder="AAAA">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="tkPlaca">Placa Vinculada</label>
                        <select id="tkPlaca" class="glass-input">
                            <option value="">Nenhuma</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="tkStatus">Situação *</label>
                        <select id="tkStatus" class="glass-input" required>
                            <option value="Ativo">Ativo</option>
                            <option value="Inativo">Inativo</option>
                            <option value="Recuperado Peças">Recuperado Peças</option>
                        </select>
                    </div>
                </div>
                <div class="form-row hidden" id="rowDescricao">
                    <div class="form-group full-width">
                        <label for="tkDescricao">Descrição da Ocorrência</label>
                        <textarea id="tkDescricao" class="glass-input" rows="3" placeholder="Relate o ocorrido..."></textarea>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-glass btn-red" id="btnCancelarTk">Cancelar</button>
                    <button type="submit" class="btn-glass btn-green"><i class="fas fa-save"></i> Salvar</button>
                </div>
            </form>
        </div>
    </div>
  </div>
  <script type="module" src="./script/menu.js" defer></script>
</body>
</html>
