<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Cadastro de Veículos</title>
  <link rel="icon" href="img/logonavegador.png" type="image/png">
  <!-- 🎨 Estilo específico desta página -->
  <link rel="stylesheet" href="css/cadastro-veiculo.css">

  <!-- Ícones Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="modal-veiculo show">
    <div class="modal-content">
      <div class="modal-header">
        <h2><i class="fas fa-truck"></i> Cadastro de Veículo</h2>
        <button type="button" class="close-modal" onclick="window.close()">&times;</button>
      </div>
      <div class="form-container">
        <form id="formVeiculo">
          <!-- 🔹 Bloco 1: Localização -->
          <div class="form-bloco">
            <h3>Localização</h3>
            <div class="form-grid">
              <div class="form-group">
                <label for="filial">Filial *</label>
                <select name="filial" id="filial" required>
                  <option value="">Selecione</option>
                </select>
              </div>
            </div>
          </div>

          <!-- 🔹 Bloco 2: Identificação do Veículo -->
          <div class="form-bloco">
            <h3>Identificação do Veículo</h3>
            <div class="form-grid">
              <div class="form-group">
                <label for="placa">Placa *</label>
                <input type="text" name="placa" id="placa" placeholder="AAA0000" required />
              </div>

              <div class="form-group">
                <label for="marca">Marca</label>
                <input type="text" name="marca" id="marca" />
              </div>

              <div class="form-group">
                <label for="modelo">Modelo</label>
                <input type="text" name="modelo" id="modelo" />
              </div>

              <div class="form-group">
                <label for="renavan">Renavan</label>
                <input type="text" name="renavan" id="renavan" />
              </div>

              <div class="form-group">
                <label for="chassi">Chassi</label>
                <input type="text" name="chassi" id="chassi" />
              </div>

              <div class="form-group">
                <label for="anofab">Ano Fabricação</label>
                <input type="number" name="anofab" id="anofab" min="1900" max="2099" step="1" placeholder="AAAA" />
              </div>

              <div class="form-group">
                <label for="anomod">Ano Modelo</label>
                <input type="number" name="anomod" id="anomod" min="1900" max="2099" step="1" placeholder="AAAA" />
              </div>

              <div class="form-group">
                <label for="qtdtanque">QTD de Tanques</label>
                <input type="number" name="qtdtanque" id="qtdtanque" min="1" max="2" step="1" />
              </div>

              <div class="form-group">
                <label for="tipo">Tipo</label>
                <select name="tipo" id="tipo">
                  <option value="">Selecione</option>
                  <option value="HR/VAN">HR/VAN</option>
                  <option value="MUNKC">MUNKC</option>
                  <option value="SEMI-REBOQUE">SEMI-REBOQUE</option>
                  <option value="OPERACIONAL">OPERACIONAL</option>
                  <option value="RESERVA">RESERVA</option>
                  
                </select>
              </div>

              <div class="form-group">
                <label for="situacao">Situação *</label>
                <select name="situacao" id="situacao" required>
                  <option value="">Selecione</option>
                  <option value="ativo">Ativo</option>
                  <option value="inativo">Inativo</option>
                  <option value="INTERNADO">INTERNADO</option>
                </select>
              </div>
              
              <div class="form-group full-width">
                <label for="qrcode">QR Code</label>
                <input type="text" name="qrcode" id="qrcode" placeholder="Código QR" />
              </div>
            </div>
          </div>

          <!-- 🔹 Botões -->
          <div class="modal-actions">
            <button type="button" onclick="window.close()" class="btn-cancelar"><i class="fas fa-times"></i> Cancelar</button>
            <button type="button" id="btnExcluir" class="btn-excluir"><i class="fas fa-trash"></i> Excluir</button>
            <button type="submit" class="btn-salvar"><i class="fas fa-save"></i> Salvar Dados</button>
          </div>
        </form>

        <!-- ✅ Exibição do usuário logado -->
        <div class="usuario-logado-modal" id="usuario-logado-modal">
          <small>👤 Usuário logado: <span id="nome-usuario"></span></small>
        </div>
      </div>
    </div>
  </div>

  <!-- ✅ Scripts -->
   <script type="module" src="./script/auth-guard.js"></script>
  <script type="module" src="./script/cadastro-veiculos.js" defer></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const usuario = JSON.parse(localStorage.getItem('usuarioLogado'));
      const nomeSpan = document.getElementById('nome-usuario');
      if (usuario && usuario.nome) {
        nomeSpan.textContent = usuario.nome;
      }
    });
  </script>
</body>
</html>
