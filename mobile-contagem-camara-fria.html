<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contagem Camara Fria Mobile - Marquespan</title>
  <link rel="icon" href="img/logonavegador.png" type="image/png">
  <link rel="stylesheet" href="css/mobile-contagem-camara-fria.css?v=20260708-dia-semana">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
</head>
<body>
  <header class="mobile-header">
    <div class="header-content">
      <img src="logo.png" alt="Logo" class="mobile-logo">
      <h1>Contagem Camara Fria</h1>
    </div>
    <a href="contagem-camara-fria.html" class="btn-desktop-link" title="Voltar para Desktop">
      <i class="fas fa-desktop"></i>
    </a>
  </header>

  <main class="mobile-container">
    <section id="screenInicio">
      <h3 class="section-title">Iniciar Contagem</h3>

      <div class="mobile-panel">
        <div class="form-group">
          <label for="mobileContagemFilial">Filial</label>
          <select id="mobileContagemFilial" required>
            <option value="">Selecione</option>
          </select>
        </div>

        <div class="form-row-mobile">
          <div class="form-group">
            <label for="mobileContagemSemana">Semana</label>
            <input type="week" id="mobileContagemSemana" required>
          </div>
          <div class="form-group">
            <label for="mobileContagemDiaSemana">Dia da Semana</label>
            <select id="mobileContagemDiaSemana" required>
              <option value="">Selecione</option>
              <option value="SEGUNDA">SEGUNDA</option>
              <option value="TERCA">TERÇA</option>
              <option value="QUARTA">QUARTA</option>
              <option value="QUINTA">QUINTA</option>
              <option value="SEXTA">SEXTA</option>
              <option value="SABADO">SÁBADO</option>
              <option value="DOMINGO">DOMINGO</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="mobileContagemFabrica">Fabrica</label>
          <select id="mobileContagemFabrica" required>
            <option value="">Selecione</option>
          </select>
        </div>

        <div class="form-group">
          <label for="mobileContagemFuncionario">Funcionario</label>
          <input type="text" id="mobileContagemFuncionario" readonly>
        </div>

        <button type="button" id="btnMobileIniciarContagem" class="btn-block btn-primary">
          <i class="fas fa-play"></i> Iniciar Contagem
        </button>
      </div>

      <h3 class="section-title">Contagens Recentes</h3>
      <div id="mobileContagensRecentes" class="cards-container">
        <div class="loading">Carregando contagens...</div>
      </div>
    </section>

    <section id="screenProdutos" class="hidden">
      <div class="list-header">
        <button type="button" id="btnMobileVoltar" class="btn-back"><i class="fas fa-arrow-left"></i> Voltar</button>
        <div>
          <h3 id="mobileTituloContagem">Contagem</h3>
          <small id="mobileSubtituloContagem"></small>
        </div>
      </div>

      <div class="status-card">
        <span id="mobileStatusContagem" class="status-pill">Em andamento</span>
        <span id="mobileInfoContagem"></span>
      </div>

      <div class="kpi-grid">
        <div class="kpi-card">
          <span>Total Caixas</span>
          <strong id="mobileKpiCaixas">0</strong>
        </div>
        <div class="kpi-card">
          <span>Peso Total</span>
          <strong id="mobileKpiPeso">0,000 KG</strong>
        </div>
        <div class="kpi-card">
          <span>Itens</span>
          <strong id="mobileKpiItens">0</strong>
        </div>
      </div>

      <div class="search-bar">
        <input type="text" id="mobileBuscaProduto" placeholder="Buscar produto ou codigo...">
        <i class="fas fa-search"></i>
      </div>

      <div id="mobileProdutosLista" class="cards-container produtos-container">
        <div class="loading">Carregando produtos...</div>
      </div>

      <div class="mobile-bottom-actions">
        <button type="button" id="btnMobileSalvarContagem" class="btn-bottom btn-save">
          <i class="fas fa-save"></i> Salvar
        </button>
        <button type="button" id="btnMobileFinalizarContagem" class="btn-bottom btn-finish">
          <i class="fas fa-check"></i> Finalizar
        </button>
        <button type="button" id="btnMobileResumoPDF" class="btn-bottom btn-pdf">
          <i class="fas fa-file-pdf"></i> PDF
        </button>
        <button type="button" id="btnMobileCancelarContagem" class="btn-bottom btn-cancel">
          <i class="fas fa-ban"></i> Cancelar
        </button>
      </div>
    </section>
  </main>

  <script type="module" src="./script/auth-guard.js"></script>
  <script type="module" src="./script/presenca-online.js"></script>
  <script type="module" src="script/mobile-contagem-camara-fria.js?v=20260708-dia-semana"></script>
</body>
</html>
