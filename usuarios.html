<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Gestão de Usuários</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/index.css">
  <link rel="stylesheet" href="css/usuarios.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .badge-status { padding: 4px 8px; border-radius: 12px; font-size: 0.7rem; font-weight: bold; color: white; display: inline-block; min-width: 85px; text-align: center; }
    .status-ativo { background-color: #28a745; }
    .status-inativo { background-color: #dc3545; }
    .status-temporario { background-color: #fd7e14; }
  </style>
</head>
<body>

  <!-- Container para injeção do Menu Lateral -->
  <div id="menu-container"></div>

  <!-- 🧱 Conteúdo principal -->
  <main class="main-content">
    <header class="header glass-header">
      <h1><i class="fas fa-users"></i> Gestão de Usuários</h1>
    </header>

    <!-- Seção de Cadastro (Oculta por padrão) -->
    <section id="cadastro" class="glass-panel hidden">
      <h3><i class="fas fa-user-plus"></i> Dados do Usuário</h3>
        <form id="formUsuario">
            <div class="form-grid">
              <div class="form-group">
                <label for="nome">Nome de Usuário *</label>
                <input type="text" id="nome" placeholder="Ex: joao.silva" required class="glass-input">
              </div>
              
              <div class="form-group">
                <label for="nomecompleto">Nome Completo *</label>
                <input type="text" id="nomecompleto" placeholder="Ex: João da Silva" required class="glass-input">
              </div>
              
              <div class="form-group">
                <label for="email">Email *</label>
                <input type="email" id="email" placeholder="exemplo@marquespan.com.br" autocomplete="email" required class="glass-input">
              </div>
              
              <div class="form-group">
                <label for="nivel">Nível de Acesso *</label>
                <select id="nivel" required class="glass-input">
                  <option value="" disabled selected>Selecione o nível</option>
                  <!-- Os níveis serão carregados dinamicamente -->
                </select>
              </div>
              
              <div class="form-group">
                <label for="status">Status *</label>
                <select id="status" required class="glass-input">
                  <option value="ATIVO" selected>ATIVO</option>
                  <option value="INATIVO">INATIVO</option>
                  <option value="TEMPORARIO">TEMPORARIO (24 HORAS)</option>
                </select>
              </div>

              <div class="form-group">
                <label for="filial">Filial</label>
                <select id="filial" class="glass-input">
                  <option value="" selected>Todas (Acesso Global)</option>
                </select>
              </div>
              
              <div class="form-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" placeholder="Deixe vazio para manter a atual" autocomplete="new-password" class="glass-input">
              </div>
            </div>

            <div class="form-actions">
              <button type="button" id="btnCancelar" class="btn-glass btn-red"><i class="fas fa-times"></i> Cancelar</button>
              <button type="submit" id="btnSalvar" class="btn-glass btn-green"><i class="fas fa-check"></i> Salvar</button>
            </div>
            <input type="hidden" id="usuarioId">
        </form>
    </section>

    <!-- Seção de Busca e Listagem -->
    <section id="busca" class="glass-panel">
        <div class="panel-header-actions">
          <h3><i class="fas fa-list"></i> Lista de Usuários</h3>
          <div class="acoes-grid-header">
            <button id="btnAtualizarLista" class="btn-glass btn-blue"><i class="fas fa-sync-alt"></i> Atualizar</button>
            <button id="btnAdicionarNovo" class="btn-glass btn-green"><i class="fas fa-plus"></i> Novo Usuário</button>
          </div>
        </div>

        <div class="filtros-container" style="margin-bottom: 20px;">
          <div class="form-group-filter" style="width: 100%;">
            <input type="text" id="termoBusca" placeholder="🔍 Buscar por nome, email ou código..." class="glass-input">
          </div>
        </div>

        <div class="table-responsive usuarios-table-container">
          <table id="tabelaUsuarios" class="glass-table">
            <thead>
              <tr>
                <th data-sort="id" style="cursor: pointer;">CÓDIGO <i class="fas fa-sort"></i></th>
                <th data-sort="nome" style="cursor: pointer;">NOME <i class="fas fa-sort"></i></th>
                <th data-sort="nomecompleto" style="cursor: pointer;">NOME COMPLETO <i class="fas fa-sort"></i></th>
                <th data-sort="email" style="cursor: pointer;">EMAIL <i class="fas fa-sort"></i></th>
                <th data-sort="nivel" style="cursor: pointer;">NÍVEL <i class="fas fa-sort"></i></th>
                <th data-sort="filial" style="cursor: pointer;">FILIAL <i class="fas fa-sort"></i></th>
                <th style="text-align: center; cursor: pointer;" data-sort="status">STATUS <i class="fas fa-sort"></i></th>
                <th>AÇÕES</th>
              </tr>
            </thead>
            <tbody id="corpoTabelaUsuarios"></tbody>
          </table>
        </div>
    </section>
  </main>

  <!-- 🦶 Rodapé -->
  <footer class="footer">
    &copy; 2025 GTSYSTEM - Marquespan. Todos os direitos reservados.
  </footer>

  <!-- 🚀 Scripts -->
  <script type="module" src="./script/menu.js" defer></script>
  <script type="module" src="./script/usuarios.js" defer></script>
</body>
</html>
