<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engraxe Mobile - Marquespan</title>
    <link rel="stylesheet" href="css/mobile-engraxe.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- VISTA 1: LISTA DE LISTAS -->
    <div id="viewListas">
        <header class="mobile-header">
            <h1><i class="fas fa-truck-moving"></i> Listas de Engraxe</h1>
            <a href="engraxe.html" class="btn-icon"><i class="fas fa-desktop"></i></a>
        </header>
        <div id="listaDeListas">
            <!-- Preenchido via JS -->
        </div>
    </div>

    <!-- VISTA 2: ITENS DA LISTA -->
    <div id="viewItens" class="hidden">
        <header class="mobile-header">
            <div class="header-content">
                <button id="btnVoltarListas" class="btn-icon"><i class="fas fa-arrow-left"></i></button>
                <h1 id="tituloListaAtual">Lista</h1>
            </div>
        </header>
        
        <div class="mobile-container">
            <div class="form-group">
                <input type="text" id="filtroVeiculoMobile" class="search-input" placeholder="🔍 Filtrar placa ou modelo...">
            </div>

            <!-- Filtros por Status (Abas) -->
            <div class="filter-tabs">
                <button class="tab active" data-filter="TODOS">Todos <small id="countTodos">(0)</small></button>
                <button class="tab" data-filter="PENDENTE">Pendentes <small id="countPendentes">(0)</small></button>
                <button class="tab" data-filter="OK">Feitos <small id="countRealizados">(0)</small></button>
                <button class="tab" data-filter="ROTA">Rota <small id="countRota">(0)</small></button>
                <button class="tab" data-filter="INTERNADO">Internado <small id="countInternados">(0)</small></button>
            </div>

            <div id="listaVeiculosContainer">
                <!-- Preenchido via JS -->
            </div>
        </div>
    </div>

    <!-- MODAL DE EDIÇÃO -->
    <div id="modalEditarItem" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalPlacaTitulo">Editar Veículo</h3>
                <button id="btnFecharModal" class="close-button">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editItemId">
                
                <div class="form-group">
                    <label>Data Realizado</label>
                    <input type="date" id="editRealizado">
                </div>
                
                <div class="form-group">
                    <label>Próximo Vencimento</label>
                    <input type="date" id="editProximo" readonly style="background-color: #eee;">
                </div>

                <div class="form-row-mobile">
                    <div class="form-group">
                        <label>Status</label>
                        <select id="editStatus">
                            <option value="PENDENTE">PENDENTE</option>
                            <option value="OK">OK</option>
                            <option value="ROTA">ROTA</option>
                            <option value="INTERNADO">INTERNADO</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>KM</label>
                        <input type="number" id="editKm" placeholder="KM Atual">
                    </div>
                </div>

                <div class="form-row-mobile">
                    <div class="form-group">
                        <label>Plaqueta (S/N)</label>
                        <select id="editPlaqueta">
                            <option value="">-</option>
                            <option value="SIM">SIM</option>
                            <option value="NAO">NÃO</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>SEG</label>
                        <select id="editSeg">
                            <option value="">-</option>
                            <option value="OK">OK</option>
                            <option value="PENDENTE">PENDENTE</option>
                        </select>
                    </div>
                </div>

                <button id="btnSalvarItemMobile" class="btn-block">Salvar</button>
            </div>
        </div>
    </div>

    <script type="module" src="script/mobile-engraxe.js"></script>
</body>
</html>
