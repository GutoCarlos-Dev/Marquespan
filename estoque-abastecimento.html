<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estoque de Combustível - Marquespan</title>
  <link rel="stylesheet" href="css/index.css" />
  <link rel="stylesheet" href="css/estoque-abastecimento.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="icon" href="logo.png" type="image/png">
</head>
<body>
  <!-- Container para injeção do Menu Lateral -->
  <div id="menu-container"></div>

  <!-- 🧱 Conteúdo principal -->
  <main class="main-content">
      <header class="header glass-header" style="display: flex; justify-content: space-between; align-items: center;">
        <h1><i class="fas fa-oil-can"></i> Estoque de Combustível</h1>
        <button id="btnAtualizarDados" class="btn-glass btn-blue" style="font-size: 0.9rem;">
            <i class="fas fa-sync-alt"></i> Atualizar
        </button>
      </header>

      <!-- PAINEL: RESUMO DO ESTOQUE -->
      <section class="glass-panel">
          <div class="panel-header-actions">
            <h3><i class="fas fa-tachometer-alt"></i> Nível dos Tanques</h3>
          </div>
          <div class="table-responsive">
            <table class="glass-table data-grid">
              <thead>
                <tr>
                  <th>Tanque</th>
                  <th>Combustível</th>
                  <th class="text-right">Capacidade</th>
                  <th class="text-right">Estoque Atual</th>
                  <th class="text-center" style="width: 30%;">Nível (%)</th>
                </tr>
              </thead>
              <tbody id="tableBodyResumoEstoque">
                <tr><td colspan="5" class="text-center">Carregando...</td></tr>
              </tbody>
            </table>
          </div>
      </section>

      <!-- PAINEL: HISTÓRICO DE MOVIMENTAÇÕES -->
      <section class="glass-panel">
          <div class="panel-header-actions">
              <h3><i class="fas fa-history"></i> Histórico de Movimentações</h3>
          </div>
          <div class="table-responsive" style="max-height: 500px; overflow-y: auto;">
              <table class="glass-table data-grid">
                  <thead>
                      <tr>
                          <th>Data</th>
                          <th>Tipo</th>
                          <th>Tanque</th>
                          <th class="text-right">Litros</th>
                          <th>Detalhe</th>
                      </tr>
                  </thead>
                  <tbody id="tableBodyHistorico">
                    <tr><td colspan="5" class="text-center">Carregando...</td></tr>
                  </tbody>
              </table>
          </div>
      </section>

  </main>

  <script type="module" src="./script/menu.js"></script>
  <script type="module" src="./script/estoque-abastecimento.js"></script>
</body>
</html>
