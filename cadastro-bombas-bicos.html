<!DOCTYPE html>
<html lang="pt-br">
<head> 
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Bombas e Bicos - Marquespan</title>
  <link rel="stylesheet" href="css/index.css" />
  <link rel="stylesheet" href="css/comodato.css" />
  <link rel="stylesheet" href="css/cadastro-bombas-bicos.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="icon" href="logo.png" type="image/png">
</head>
<body>
  <div id="menu-container"></div>
 
  <main class="main-content">
    <header class="header glass-header">
      <h1><i class="fas fa-gas-pump"></i> Cadastro de Bombas e Bicos</h1>
    </header>
 
    <!-- SEÇÃO: CADASTRO DE BOMBAS -->
    <section class="glass-panel">
      <h3><i class="fas fa-plus-circle"></i> Cadastrar/Editar Bomba</h3>
      <form id="formBomba">
        <input type="hidden" id="bombaEditingId">
        <div class="form-grid">
          <div class="form-group">
            <label for="bombaNome">Nome da Bomba</label>
            <input type="text" id="bombaNome" class="glass-input" required>
          </div>
          <div class="form-group">
            <label for="bombaTanque">Tanque Associado</label>
            <select id="bombaTanque" class="glass-input" required>
              <option value="">-- Selecione o Tanque --</option>
            </select>
          </div>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn-glass btn-green"><i class="fas fa-save"></i> Salvar Bomba</button>
          <button type="button" id="btnLimparBomba" class="btn-glass btn-blue"><i class="fas fa-eraser"></i> Limpar</button>
        </div>
      </form>
    </section>
 
    <section class="glass-panel">
      <h3><i class="fas fa-list"></i> Bombas Cadastradas</h3>
      <div class="table-responsive">
        <table class="glass-table data-grid">
          <thead>
            <tr>
              <th>Nome da Bomba</th>
              <th>Tanque Associado</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="tableBodyBombas">
            <!-- Preenchido via JS -->
          </tbody>
        </table>
      </div>
    </section>
 
    <!-- SEÇÃO: CADASTRO DE BICOS -->
    <section class="section-divider glass-panel">
      <h3><i class="fas fa-plus-circle"></i> Cadastrar/Editar Bico</h3>
      <form id="formBico">
        <input type="hidden" id="bicoEditingId">
        <div class="form-grid">
          <div class="form-group">
            <label for="bicoNome">Nome do Bico</label>
            <input type="text" id="bicoNome" class="glass-input" required>
          </div>
          <div class="form-group">
            <label for="bicoBomba">Bomba Associada</label>
            <select id="bicoBomba" class="glass-input" required>
              <option value="">-- Selecione a Bomba --</option>
            </select>
          </div>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn-glass btn-green"><i class="fas fa-save"></i> Salvar Bico</button>
          <button type="button" id="btnLimparBico" class="btn-glass btn-blue"><i class="fas fa-eraser"></i> Limpar</button>
        </div>
      </form>
    </section>
 
    <section class="glass-panel">
      <h3><i class="fas fa-list"></i> Bicos Cadastrados</h3>
      <div class="table-responsive">
        <table class="glass-table data-grid">
          <thead>
            <tr>
              <th>Nome do Bico</th>
              <th>Bomba (Tanque)</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="tableBodyBicos">
            <!-- Preenchido via JS -->
          </tbody>
        </table>
      </div>
    </section>
  </main>
 
  <footer class="footer">&copy; 2025 GTSYSTEM - Marquespan. Todos os direitos reservados.</footer>
  <script type="module" src="./script/menu.js" defer></script>
  <script type="module" src="./script/cadastro-bombas-bicos.js"></script>
</body>
</html>
