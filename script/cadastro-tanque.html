<!DOCTYPE html>
<html lang="pt-br">
<head> 
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Tanques - Marquespan</title>
  <link rel="stylesheet" href="css/index.css" />
  <link rel="stylesheet" href="css/comodato.css" /> <!-- Reutilizando para o layout em grid -->
  <link rel="stylesheet" href="css/cadastro-tanque.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="icon" href="logo.png" type="image/png">
</head>
<body>
  <div id="menu-container"></div>
 
  <main class="main-content">
    <header class="header glass-header">
      <h1><i class="fas fa-gas-pump"></i> Cadastro de Tanques</h1>
    </header>
 
    <section class="glass-panel">
      <h3><i class="fas fa-plus-circle"></i> Cadastrar/Editar Tanque</h3>
      <form id="formTanque">
        <input type="hidden" id="tanqueEditingId">
        <div class="form-grid">
          <div class="form-group">
            <label for="tanqueNome">Nome do Tanque</label>
            <input type="text" id="tanqueNome" class="glass-input" required>
          </div>
          <div class="form-group">
            <label for="tanqueFilial">Filial</label>
            <select id="tanqueFilial" class="glass-input" required>
              <option value="">Selecione a Filial</option>
            </select>
          </div>
          <div class="form-group">
            <label for="tanqueCapacidade">Capacidade (Litros)</label>
            <input type="number" step="0.01" id="tanqueCapacidade" class="glass-input" required>
          </div>
          <div class="form-group">
            <label for="tanqueTipoCombustivel">Tipo de Combustível</label>
            <select id="tanqueTipoCombustivel" class="glass-input" required>
              <option value="">Selecione o Tipo</option>
              <option value="DIESEL">DIESEL</option>
              <option value="GASOLINA">GASOLINA</option>
              <option value="ETANOL">ETANOL</option>
            </select>
          </div>
        </div> 
        <div class="form-actions"> 
          <button type="submit" id="btnSalvarTanque" class="btn-glass btn-green"><i class="fas fa-save"></i> Salvar Tanque</button>
          <button type="button" id="btnLimparForm" class="btn-glass btn-blue"><i class="fas fa-eraser"></i> Limpar</button>
        </div>
      </form>
    </section>
 
    <section class="glass-panel">
      <h3><i class="fas fa-list"></i> Tanques Cadastrados</h3>
      <div class="table-responsive">
        <table class="glass-table data-grid">
          <thead>
            <tr>
              <th>Nome</th>
              <th>Filial</th>
              <th>Capacidade (L)</th>
              <th>Tipo de Combustível</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="tableBodyTanques">
            <!-- Preenchido via JS -->
          </tbody>
        </table>
      </div>
    </section> 
  </main>
 
  <footer class="footer">&copy; 2025 GTSYSTEM - Marquespan. Todos os direitos reservados.</footer>
  <script type="module" src="./script/menu.js"></script>
  <script type="module" src="script/cadastro-tanque.js"></script>
</body>
</html>
