<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Buscar Carregamento - Marquespan</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/index.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <!-- 🟩 Menu Dinâmico -->
  <div id="menu-container"></div>

  <!-- 🧱 Conteúdo principal -->
  <div class="main-content">
    <header class="header">🔍 Buscar Carregamento</header>

    <section class="secao">
      <h3>📋 Filtros de Busca</h3>
      <div class="campo-busca">
        <input type="text" id="termoBusca" placeholder="Buscar por placa, requisição ou cliente">
      </div>
      <div class="botoes-form">
        <button id="btnBuscar">🔍 Buscar</button>
        <button id="btnLimpar">🗑️ Limpar</button>
      </div>

      <table id="tabelaCarregamentos" class="tabela-usuarios">
        <thead>
          <tr>
            <th>Data</th>
            <th>Placa</th>
            <th>Requisição</th>
            <th>Cliente</th>
            <th>Usuário</th>
            <th>Situação</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="corpoTabelaCarregamentos"></tbody>
      </table>
    </section>

    <footer class="footer">
      &copy; 2025 GTSYSTEM - Marquespan. Todos os direitos reservados.
    </footer>
  </div>

  <!-- 🚀 Scripts -->
  <script type="module" src="./script/menu.js" defer></script>
  <script type="module" src="./script/auth-guard.js"></script>
  

</body>
</html>
