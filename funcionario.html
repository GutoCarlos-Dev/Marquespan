<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Funcionários - Marquespan</title>
  <link rel="stylesheet" href="css/index.css" />
  <link rel="stylesheet" href="css/funcionario.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="icon" href="logo.png" type="image/png">
</head>
<body>
  <div class="container">
    <div id="menu-container">
      <!-- O menu será injetado aqui pelo menu.js -->
    </div>
    <div class="main-content">
      <header class="header glass-header">
        <h1><i class="fas fa-users"></i> Cadastro de Funcionários</h1>
      </header>

      <section id="sectionCadastrarFuncionarios" class="glass-panel">
        <h3><i class="fas fa-user-plus"></i> Formulário do Colaborador</h3>
        <form id="formCadastrarFuncionario">
          <input type="hidden" id="funcEditingId">
          <div class="funcionario-layout">
              <!-- Card Principal: Dados de Registro e Contato -->
              <div class="glass-panel-inner">
                  <div class="form-grid">
                      <div class="form-group">
                          <label for="funcRH">Nº Identificador (RH)</label>
                          <input type="text" id="funcRH" required class="glass-input" placeholder="Registro RH">
                      </div>
                      <div class="form-group">
                          <label for="funcNome">Nome (Ex: JOÃO)</label>
                          <input type="text" id="funcNome" required class="glass-input" placeholder="Nome para exibição">
                      </div>
                      <div class="form-group">
                          <label for="funcNomeCompleto">Nome Completo</label>
                          <input type="text" id="funcNomeCompleto" required class="glass-input" placeholder="Nome completo do colaborador">
                      </div>
                      <div class="form-group">
                          <label for="funcAdmissao">Data Admissão</label>
                          <input type="date" id="funcAdmissao" required class="glass-input">
                      </div>
                      <div class="form-group">
                          <label for="funcFuncao">Função Atual</label>
                          <select id="funcFuncao" required class="glass-input">
                              <option value="" disabled selected>-- Selecione --</option>
                              <option value="Jovem Aprendiz">Jovem Aprendiz</option>
                              <option value="Auxiliar de Transporte">Auxiliar de Transporte</option>
                              <option value="Auxiliar de Logistica">Auxiliar de Logistica</option>
                              <option value="Auxiliar de Logistica ADM">Auxiliar de Logistica ADM</option>
                              <option value="Motorista">Motorista</option>
                              <option value="Motorista Patio">Motorista Patio</option>
                              <option value="Motorista Carreta">Motorista Carreta</option>
                              <option value="Motorista Bitrem">Motorista Bitrem</option>
                              <option value="Motorista Munck">Motorista Munck</option>
                              <option value="Líder Logística">Líder Logística</option>
                              <option value="Encarregado Operacional">Encarregado Operacional</option>
                              <option value="Gerente Operacional">Gerente Operacional</option>
                          </select>
                      </div>
                      <div class="form-group">
                          <label for="funcContatoCorp">Contato Corporativo</label>
                          <input type="text" id="funcContatoCorp" class="glass-input" placeholder="Celular Empresa">
                      </div>
                      <div class="form-group">
                          <label for="funcContatoPessoal">Contato Pessoal</label>
                          <input type="text" id="funcContatoPessoal" class="glass-input" placeholder="Celular Particular">
                      </div>
                      <div class="form-group">
                          <label for="funcStatus">Status</label>
                          <select id="funcStatus" required class="glass-input">
                              <option value="Ativo">ATIVO</option>
                              <option value="Desligado">DESLIGADO</option>
                              <option value="Ferias">FÉRIAS</option>
                              <option value="Afastado">AFASTADO</option>
                          </select>
                      </div>
                      <div class="form-group hidden" id="groupDesligamento">
                          <label for="funcDesligamento">Data Desligamento</label>
                          <input type="date" id="funcDesligamento" class="glass-input">
                      </div>
                  </div>

                  <!-- Sub-card de Promoção -->
                  <h4 style="margin: 25px 0 15px 0; color: var(--primary-color); font-size: 0.9rem; text-transform: uppercase;"><i class="fas fa-history"></i> Alteração de Função</h4>
                  <div class="form-grid">
                      <div class="form-group">
                          <label for="funcPromocao">Função Anterior (Auditado)</label>
                          <select id="funcPromocao" class="glass-input">
                              <option value="">Nenhuma registrada</option>
                              <option value="Jovem Aprendiz">Jovem Aprendiz</option>
                              <option value="Auxiliar de Transporte">Auxiliar de Transporte</option>
                              <option value="Auxiliar de Logistica">Auxiliar de Logistica</option>
                              <option value="Auxiliar de Logistica ADM">Auxiliar de Logistica ADM</option>
                              <option value="Motorista">Motorista</option>
                              <option value="Motorista Patio">Motorista Patio</option>
                              <option value="Motorista Carreta">Motorista Carreta</option>
                              <option value="Motorista Bitrem">Motorista Bitrem</option>
                              <option value="Motorista Munck">Motorista Munck</option>
                              <option value="Líder Logística">Líder Logística</option>
                              <option value="Encarregado Operacional">Encarregado Operacional</option>
                              <option value="Gerente Operacional">Gerente Operacional</option>
                          </select>
                      </div>
                      <div class="form-group">
                          <label for="funcDataPromocao">Data da Mudança</label>
                          <input type="date" id="funcDataPromocao" class="glass-input">
                      </div>
                  </div>
              </div>

              <!-- Card de Ações Laterais -->
              <div class="glass-panel-inner actions-panel">
                  <div class="form-actions-vertical">
                      <button type="submit" id="btnSubmitFunc" class="btn-glass btn-green"><i class="fas fa-save"></i> Salvar Registro</button>
                      <button type="button" id="btnClearFuncForm" class="btn-glass btn-red hidden"><i class="fas fa-times"></i> Cancelar</button>
                  </div>
              </div>
          </div>
        </form>

        <hr style="margin: 30px 0; border-color: rgba(0,0,0,0.1);">

        <h3><i class="fas fa-id-card"></i> Quadro de Funcionários</h3>
        <div class="form-group" style="margin-bottom: 15px;">
            <input type="text" id="searchFuncInput" placeholder="🔍 Filtrar por nome, RH ou função..." class="glass-input">
        </div>

        <div class="table-responsive funcionario-table-container">
            <table class="glass-table data-grid">
                <thead>
                <tr>
                    <th>RH</th>
                    <th>NOME</th>
                    <th>FUNÇÃO</th>
                    <th>ADMISSÃO</th>
                    <th>CONTATO</th>
                    <th>STATUS</th>
                    <th style="width: 100px;">AÇÕES</th>
                </tr>
                </thead>
                <tbody id="funcTableBody"></tbody>
            </table>
        </div>
      </section>
    </div>
  </div>
  <footer class="footer">&copy; 2025 GTSYSTEM - Marquespan. Todos os direitos reservados.</footer>
  <script type="module" src="./script/menu.js" defer></script>
  <script type="module" src="script/funcionario.js"></script>
</body>
</html>
