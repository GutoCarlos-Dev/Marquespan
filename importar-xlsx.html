<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Importar XLSX - Marquespan</title>
  <link rel="stylesheet" href="css/index.css">
  <link rel="stylesheet" href="css/menu.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/iniciar-carregamento.css">
  <link rel="stylesheet" href="css/importar-xlsx.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
  <div id="menu-container"></div>

  <main class="main-content">
    <header class="header glass-header">
      <h1><i class="fas fa-file-excel"></i> Importar Requisições XLSX</h1>
    </header>

    <section class="glass-panel">
      <h3><i class="fas fa-truck-loading"></i> Dados do Carregamento</h3>
      <div class="form-grid">
        <div class="form-group">
          <label for="semana">Semana:</label>
          <input type="text" id="semana" class="glass-input" placeholder="Ex.: 24-2026" required>
        </div>
        <div class="form-group">
          <label for="dataHora">Data/Hora:</label>
          <input type="datetime-local" id="dataHora" class="glass-input" step="60" required>
        </div>
        <div class="form-group">
          <label for="placa">Placa:</label>
          <input type="text" id="placa" class="glass-input" placeholder="Selecione um veículo cadastrado" list="placas-list" required>
          <datalist id="placas-list"></datalist>
        </div>
        <div class="form-group">
          <label for="motorista">Motorista:</label>
          <input type="text" id="motorista" class="glass-input" placeholder="Selecione um motorista ativo" list="motoristas-list" required>
          <datalist id="motoristas-list"></datalist>
        </div>
        <div class="form-group">
          <label for="conferente">Conferente:</label>
          <input type="text" id="conferente" class="glass-input" placeholder="Usuário logado" disabled>
          <input type="hidden" id="usuario-logado-hidden">
        </div>
        <div class="form-group">
          <label for="supervisor">Supervisor:</label>
          <input type="text" id="supervisor" class="glass-input" placeholder="Selecione um supervisor ativo" list="supervisores-list">
          <datalist id="supervisores-list"></datalist>
        </div>
      </div>
    </section>

    <section class="glass-panel upload-panel">
      <h3><i class="fas fa-folder-open"></i> Selecionar Arquivos</h3>
      <label class="upload-dropzone" for="fileUpload">
        <i class="fas fa-cloud-arrow-up"></i>
        <strong>Selecione um ou mais arquivos XLSX</strong>
        <span id="fileSelectionText">Nenhum arquivo selecionado</span>
      </label>
      <input type="file" id="fileUpload" multiple accept=".xlsx,.xls">
      <p class="upload-help">Os nomes dos arquivos devem conter marcadores como (NOVO), (TROCA), (AMT), (RP), (RT) ou (RE).</p>
    </section>

    <section class="form-actions import-actions">
      <button type="button" class="btn-glass btn-blue" id="btnAtualizar">
        <i class="fas fa-calculator"></i> Atualizar Totais
      </button>
      <button type="button" class="btn-glass btn-green" id="btnGerarXLS">
        <i class="fas fa-file-excel"></i> Gerar XLS de Resumo
      </button>
      <button type="button" class="btn-glass btn-orange" id="btnIniciarCarregamento">
        <i class="fas fa-truck-loading"></i> Iniciar Carregamento
      </button>
    </section>

    <div id="importStatus" class="import-status hidden" role="status"></div>
    <datalist id="clientes-list"></datalist>
    <section id="tables" class="tables-section"></section>
    <section id="resumo"></section>

    <footer class="footer">
      &copy; 2026 GTSYSTEM - Marquespan. Todos os direitos reservados.
    </footer>
  </main>

  <script type="module" src="./script/auth-guard.js"></script>
  <script type="module" src="./script/menu.js" defer></script>
  <script type="module" src="./script/importar-xlsx.js?v=20260610-3"></script>
</body>
</html>
