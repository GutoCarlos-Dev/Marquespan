<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório de Abastecimento - Marquespan</title>
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/relatorio-abastecimento.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <link rel="icon" href="logo.png" type="image/png">
    <style>
        .filtros-cards-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .filtro-card {
            background: rgba(255, 255, 255, 0.6);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }
        .filtro-card h4 { margin-top: 0; margin-bottom: 15px; color: var(--primary-color); border-bottom: 1px solid #eee; padding-bottom: 8px; }
    </style>
</head>
<body>
    <div id="menu-container"></div>

    <main class="main-content">
        <header class="glass-header">
            <h1><i class="fas fa-gas-pump"></i> Relatório de Movimentação de Combustível</h1>
        </header>

        <!-- Filtros -->
        <section class="glass-panel">
            <h3><i class="fas fa-filter"></i> Filtros do Relatório</h3>
            <form id="formFiltroAbastecimento">
                <div class="filtros-cards-container">
                    <!-- Card 1: Período -->
                    <div class="filtro-card">
                        <h4>Período</h4>
                        <div class="form-group">
                            <label for="dataInicial">Data Inicial</label>
                            <input type="date" id="dataInicial" class="glass-input" required>
                        </div>
                        <div class="form-group">
                            <label for="dataFinal">Data Final</label>
                            <input type="date" id="dataFinal" class="glass-input" required>
                        </div>
                    </div>

                    <!-- Card 2: Filtros de Movimentação -->
                    <div class="filtro-card">
                        <h4>Movimentação</h4>
                        <div class="form-group">
                            <label for="filtroTanque">Tanque</label>
                            <select id="filtroTanque" class="glass-input">
                                <option value="">Todos</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="filtroTipoMovimentacao">Tipo</label>
                            <select id="filtroTipoMovimentacao" class="glass-input" multiple></select>
                        </div>
                    </div>

                    <!-- Card 3: Filtros Específicos -->
                    <div class="filtro-card">
                        <h4>Específicos</h4>
                    <div class="form-group">
                        <label for="filtroTipoVeiculo">Tipo de Veículo</label>
                        <select id="filtroTipoVeiculo" class="glass-input">
                            <option value="">Todos</option>
                        </select>
                    </div>
                        <div class="form-group">
                            <label for="filtroVeiculo">Veículo (Placa)</label>
                            <input type="text" id="filtroVeiculo" class="glass-input" list="listaVeiculosFiltro" placeholder="Todos">
                            <datalist id="listaVeiculosFiltro"></datalist>
                        </div>
                        <div class="form-group">
                            <label for="filtroRota">Rota</label>
                            <input type="text" id="filtroRota" class="glass-input" list="listaRotasFiltro" placeholder="Todas">
                            <datalist id="listaRotasFiltro"></datalist>
                        </div>
                    </div>
                </div>

                <div class="form-actions" style="border-top: 1px solid #eee; padding-top: 15px; margin-top: 15px;">
                    <div class="checkbox-group" style="margin-right: auto;">
                        <input type="checkbox" id="incluirAjusteEstoque" checked>
                        <label for="incluirAjusteEstoque" style="margin:0; cursor:pointer;">Incluir Ajustes</label>
                    </div>
                    <div class="form-group" style="flex-direction: row; gap: 10px; margin-left: auto;">
                        <button type="submit" class="btn-glass btn-primary"><i class="fas fa-search"></i> Buscar</button>
                        <button type="button" id="btnLimparFiltros" class="btn-glass btn-secondary"><i class="fas fa-eraser"></i> Limpar</button>
                    </div>
                </div>
            </form>
        </section>

        <!-- Resultados -->
        <section id="cardResultados" class="glass-panel hidden">
            <div class="resumo-container">
                <div class="kpi-card">
                    <h3>Total Litros</h3>
                    <div id="totalLitros" class="valor">0,00 L</div>
                </div>
                <div class="kpi-card" style="border-left-color: #28a745;">
                    <h3>Valor Movimentado</h3>
                    <div id="totalValor" class="valor">R$ 0,00</div>
                </div>
            </div>

            <div class="acoes-exportacao">
                <button id="btnExportarXLS" class="btn-glass btn-success"><i class="fas fa-file-excel"></i> Exportar Excel</button>
                <button id="btnExportarPDF" class="btn-glass btn-danger"><i class="fas fa-file-pdf"></i> Exportar PDF</button>
            </div>

            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th data-sort="data_hora">Data/Hora <i class="fas fa-sort"></i></th>
                            <th data-sort="usuario">Usuário <i class="fas fa-sort"></i></th>
                            <th data-sort="placa">Placa <i class="fas fa-sort"></i></th>
                            <th data-sort="rota">Rota <i class="fas fa-sort"></i></th>
                            <th data-sort="km_atual">KM <i class="fas fa-sort"></i></th>
                            <th data-sort="numero_nota">Nº Nota <i class="fas fa-sort"></i></th>
                            <th data-sort="tanque">Tanque <i class="fas fa-sort"></i></th>
                            <th data-sort="combustivel">Combustível <i class="fas fa-sort"></i></th>
                            <th data-sort="litros" style="text-align: right;">Litros <i class="fas fa-sort"></i></th>
                            <th data-sort="valor_litro" style="text-align: right;">Vlr. Unit <i class="fas fa-sort"></i></th>
                            <th data-sort="valor_total" style="text-align: right;">Total <i class="fas fa-sort"></i></th>
                        </tr>
                    </thead>
                    <tbody id="tableBodyRelatorio">
                        <!-- Dados aqui -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <footer class="footer">
        &copy; 2025 GTSYSTEM - Marquespan. Todos os direitos reservados.
    </footer>

    <script type="module" src="script/menu.js"></script>
    <script type="module" src="script/relatorio-abastecimento.js"></script>
</body>
</html>
