<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>App Fiscalizacao - Ocorrencias</title>
  <link rel="stylesheet" href="css/fiscalizacao-ocorrencia-mobile.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="icon" href="logo.png" type="image/png">
</head>
<body>
  <!-- Cabecalho Mobile -->
  <header class="mobile-header">
    <div class="header-content">
      <img src="logo.png" alt="Logo" class="mobile-logo">
      <h1>Fiscalizacao</h1>
    </div>
    <a href="fiscalizacao-ocorrencia.html" class="btn-desktop-link" title="Voltar para Desktop"><i class="fas fa-desktop"></i></a>
  </header>

  <div class="mobile-container">
    <button type="button" id="btnAdicionarOcorrencia" class="fab-button">
      <i class="fas fa-plus"></i>
    </button>

    <div class="mobile-filters">
      <div class="mobile-search">
        <i class="fas fa-search"></i>
        <input type="search" id="mobileBusca" placeholder="Buscar placa, rota, motorista...">
      </div>
      <div class="filter-row">
        <div style="flex: 1;">
          <label for="mobileFiltroDataDe">Data de</label>
          <input type="date" id="mobileFiltroDataDe">
        </div>
        <div style="flex: 1;">
          <label for="mobileFiltroDataAte">Data ate</label>
          <input type="date" id="mobileFiltroDataAte">
        </div>
      </div>
      <button type="button" id="btnAtualizarMobile" class="btn-primary btn-block">
        <i class="fas fa-sync-alt"></i> Atualizar
      </button>
      <div class="summary-line">
        <strong id="totalMobile">0</strong> registros
      </div>
    </div>

    <div class="mobile-list-container">
      <div id="listaOcorrenciasMobile" class="card-list">
        <div class="empty-state"><i class="fas fa-spinner fa-spin"></i> Carregando...</div>
      </div>
    </div>
  </div>

  <div id="modalOcorrenciaMobile" class="panel-backdrop hidden">
    <div class="panel mobile-panel">
      <div class="panel-header">
        <h3><i class="fas fa-clipboard-check"></i> Nova Ocorrencia</h3>
        <button type="button" id="btnFecharModalMobile" class="close-button">&times;</button>
      </div>
      <div class="panel-body">
        <form id="formOcorrenciaMobile">
          <fieldset class="form-fieldset">
            <legend>Informacoes internas</legend>
            <div class="form-grid-mobile">
              <div class="form-group">
                <label for="mobileData">Data</label>
                <input type="date" id="mobileData" required>
              </div>
              <div class="form-group">
                <label for="mobileHorario">Horario</label>
                <input type="time" id="mobileHorario">
              </div>
              <div class="form-group">
                <label for="mobileRota">Rota</label>
                <input type="text" id="mobileRota" list="listaRotasMobile" required autocomplete="off">
              </div>
              <div class="form-group">
                <label for="mobilePlaca">Placa</label>
                <input type="text" id="mobilePlaca" list="listaPlacasMobile" required autocomplete="off" style="text-transform: uppercase;">
              </div>
              <div class="form-group">
                <label for="mobileMotorista">Motorista(s)</label>
                <input type="text" id="mobileMotorista" list="listaMotoristasMobile" required autocomplete="off">
              </div>
              <div class="form-group">
                <label for="mobileAuxiliar">Auxiliar</label>
                <input type="text" id="mobileAuxiliar" list="listaAuxiliaresMobile" autocomplete="off">
              </div>
              <div class="form-group">
                <label for="mobileLocalOcorrencia">Local da Ocorrencia</label>
                <input type="text" id="mobileLocalOcorrencia" autocomplete="off">
              </div>
            </div>
          </fieldset>

          <fieldset class="form-fieldset">
            <legend>Envolvimento</legend>
            <div class="mobile-checkbox-group">
              <label class="mobile-checkbox-line">
                <input type="checkbox" id="mobileEnvolveVeiculoEmpresa">
                <span>Outro veiculo da empresa</span>
              </label>
              <label class="mobile-checkbox-line">
                <input type="checkbox" id="mobileEnvolveVeiculoTerceiro">
                <span>Veiculo de terceiros</span>
              </label>
              <label class="mobile-checkbox-line">
                <input type="checkbox" id="mobileEnvolveOutroPatrimonio">
                <span>Outro patrimonio</span>
              </label>
            </div>

            <div id="mobileGrupoVeiculoEmpresa" class="mobile-envolvimento-grupo hidden">
              <h4>Outro veiculo da empresa</h4>
              <div class="form-grid-mobile">
                <div class="form-group">
                  <label for="mobileEmpresaPlaca">Placa</label>
                  <input type="text" id="mobileEmpresaPlaca" list="listaPlacasMobile" autocomplete="off">
                </div>
                <div class="form-group">
                  <label for="mobileEmpresaModelo">Modelo</label>
                  <input type="text" id="mobileEmpresaModelo" autocomplete="off">
                </div>
                <div class="form-group">
                  <label for="mobileEmpresaMotoristaResponsavel">Motorista Responsavel</label>
                  <input type="text" id="mobileEmpresaMotoristaResponsavel" list="listaMotoristasMobile" autocomplete="off">
                </div>
                <div class="form-group">
                  <label for="mobileEmpresaDanos">Danos Causados</label>
                  <textarea id="mobileEmpresaDanos" rows="3"></textarea>
                </div>
              </div>
            </div>

            <div id="mobileGrupoVeiculoTerceiro" class="mobile-envolvimento-grupo hidden">
              <h4>Veiculo de terceiros</h4>
              <div class="form-grid-mobile">
                <div class="form-group">
                  <label for="mobileTerceiroPlaca">Placa</label>
                  <input type="text" id="mobileTerceiroPlaca" autocomplete="off">
                </div>
                <div class="form-group">
                  <label for="mobileTerceiroModelo">Modelo</label>
                  <input type="text" id="mobileTerceiroModelo" autocomplete="off">
                </div>
                <div class="form-group">
                  <label for="mobileTerceiroCor">Cor</label>
                  <input type="text" id="mobileTerceiroCor" autocomplete="off">
                </div>
                <div class="form-group">
                  <label for="mobileTerceiroCondutor">Condutor</label>
                  <input type="text" id="mobileTerceiroCondutor" autocomplete="off">
                </div>
                <div class="form-group">
                  <label for="mobileTerceiroContato">Contato</label>
                  <input type="text" id="mobileTerceiroContato" autocomplete="off">
                </div>
                <div class="form-group">
                  <label for="mobileTerceiroDanos">Danos Causados</label>
                  <textarea id="mobileTerceiroDanos" rows="3"></textarea>
                </div>
              </div>
            </div>

            <div id="mobileGrupoOutroPatrimonio" class="mobile-envolvimento-grupo hidden">
              <h4>Outro patrimonio</h4>
              <div class="form-grid-mobile">
                <div class="form-group">
                  <label for="mobilePatrimonioTipo">Tipo Patrimonio</label>
                  <input type="text" id="mobilePatrimonioTipo" autocomplete="off">
                </div>
                <div class="form-group">
                  <label for="mobilePatrimonioResponsavel">Responsavel</label>
                  <input type="text" id="mobilePatrimonioResponsavel" autocomplete="off">
                </div>
                <div class="form-group">
                  <label for="mobilePatrimonioContato">Contato</label>
                  <input type="text" id="mobilePatrimonioContato" autocomplete="off">
                </div>
                <div class="form-group">
                  <label for="mobilePatrimonioDano">Dano Causado</label>
                  <textarea id="mobilePatrimonioDano" rows="3"></textarea>
                </div>
              </div>
            </div>
          </fieldset>

          <fieldset class="form-fieldset">
            <legend>Relatorio Ocorrido</legend>
            <div class="form-grid-mobile">
              <div class="form-group">
                <label for="mobileRelatorio">Ocorrencia</label>
                <textarea id="mobileRelatorio" rows="8" required placeholder="Descreva a ocorrencia com detalhes..."></textarea>
              </div>
            </div>
          </fieldset>

          <fieldset class="form-fieldset">
            <legend>Anexos</legend>
            <div class="form-grid-mobile">
              <div class="form-group">
                <label for="mobileAnexos">Boletim, fotos, videos e outros arquivos</label>
                <input type="file" id="mobileAnexos" multiple accept="image/*,video/*,.pdf,.doc,.docx,.xls,.xlsx,.txt">
              </div>
            </div>
            <div id="listaAnexosMobile" class="lista-anexos-mobile"></div>
          </fieldset>

          <div class="form-actions mobile-actions">
            <button type="submit" id="btnSalvarMobile" class="btn-primary btn-block btn-large">
              <i class="fas fa-save"></i> SALVAR OCORRENCIA
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <datalist id="listaPlacasMobile"></datalist>
  <datalist id="listaMotoristasMobile"></datalist>
  <datalist id="listaAuxiliaresMobile"></datalist>
  <datalist id="listaRotasMobile"></datalist>

  <script type="module" src="./script/auth-guard.js"></script>
  <script type="module" src="./script/fiscalizacao-ocorrencia-mobile.js"></script>
</body>
</html>
