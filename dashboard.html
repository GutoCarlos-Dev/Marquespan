<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Dashboard - Marquespan</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/index.css">
  <link rel="stylesheet" href="css/menu.css">
  <link rel="icon" href="logo.png" type="image/png">
</head>
<body>

  <div id="menu-container"></div>

  <div class="main-content">

    <header class="header glass-header dash-header">
      <div class="dash-header-left">
        <h1><span id="dash-saudacao">Bem-vindo</span>, <span id="dash-nome-usuario">...</span></h1>
        <p id="dash-data-hora"></p>
      </div>
      <img src="logo.png" alt="Marquespan" class="dash-logo">
    </header>

    <div class="banner-container glass-panel">
      <div class="banner-slide active"><img src="img/Marquespan_banners-caminhao.jpeg" alt="Marquespan"></div>
      <div class="banner-slide"><img src="img/Marquespan_banners-caminhao2.jpeg" alt="Marquespan"></div>
      <div class="banner-slide"><img src="img/Marquespan_banners-caminhao3.jpeg" alt="Marquespan"></div>
      <div class="banner-slide"><img src="img/Marquespan_banners-caminhao4.jpeg" alt="Marquespan"></div>
      <div class="banner-slide"><img src="img/Marquespan_banners-caminhao5.jpeg" alt="Marquespan"></div>
      <div class="banner-slide"><img src="img/Marquespan_banners-caminhao6.jpeg" alt="Marquespan"></div>
      <div class="banner-slide"><img src="img/Marquespan_banners-caminhao7.jpeg" alt="Marquespan"></div>
    </div>

    <section class="dash-modules-section">
      <h2 class="dash-section-title"><i class="fas fa-th-large"></i> Acesso Rápido</h2>
      <div id="dashModulosContainer"></div>
    </section>

    <footer class="footer">
      &copy; 2025 GTSYSTEM - Marquespan. Todos os direitos reservados.
    </footer>
  </div>

  <script type="module" src="./script/auth-guard.js"></script>
  <script type="module" src="./script/menu.js" defer></script>
  <script type="module" src="./script/dashboard.js?v=20260604-3" defer></script>
</body>
</html>
