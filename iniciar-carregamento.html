<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Carregar Veículo - Marquespan</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/index.css">
  <link rel="stylesheet" href="css/menu.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/cadastro-carregamento.css?v=20260625-12">
  <link rel="stylesheet" href="css/iniciar-carregamento.css?v=20260625-1">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
  <link rel="icon" href="img/logonavegador.png" type="image/png">
</head>
<body>
  <div id="menu-container"></div>

  <div class="main-content">
    <header class="header glass-header">
      <h1><i class="fas fa-boxes"></i> Carregar Veículo</h1>
      <button type="button" id="btnModoApp" class="btn-glass btn-blue" style="margin-left:auto">
        <i class="fas fa-mobile-alt"></i> Modo APP
      </button>
    </header>

    <!-- Página inteira da conferência -->
    <div id="cvConferenciaPagina">

      <!-- ── Estado vazio: fila + histórico ── -->
      <div id="cvSemCarregamento">

        <div class="glass-panel cv-fila-section">
          <h4 class="cv-section-titulo"><i class="fas fa-list-ol"></i> Fila de Conferência</h4>
          <p id="cvFilaVazia" class="text-muted hidden" style="font-size:13px;margin-bottom:8px;">
            Nenhum carregamento aguardando conferência.
          </p>
          <div class="cv-fila-row">
            <select id="cvSeletorCarregamento" class="glass-input" style="flex:1">
              <option value="">Selecione um carregamento...</option>
            </select>
            <button type="button" id="btnIniciarConferenciaHistorico" class="btn-glass btn-green">
              <i class="fas fa-play"></i> Iniciar Conferência
            </button>
            <button type="button" id="btnAtualizarFila" class="btn-sm-outline" title="Atualizar fila">
              <i class="fas fa-sync-alt"></i>
            </button>
          </div>
        </div>

        <div class="glass-panel cv-historico-section" style="margin-top:16px">
          <h4 class="cv-section-titulo"><i class="fas fa-history"></i> Conferências Finalizadas</h4>
          <div class="table-responsive">
            <table class="glass-table" style="font-size:12px">
              <thead><tr>
                <th>Data Saída</th>
                <th>Placa</th>
                <th>Motorista</th>
                <th>Finalizado em</th>
                <th class="text-center">OK</th>
                <th class="text-center">Div.</th>
                <th class="text-center">Ações</th>
              </tr></thead>
              <tbody id="cvHistoricoConferenciasTbody">
                <tr><td colspan="7" class="text-center text-muted">Carregando...</td></tr>
              </tbody>
            </table>
          </div>
        </div>

      </div>
      <!-- fim cvSemCarregamento -->

      <!-- ── Conferência ativa ── -->
      <div id="cvConferencia" class="hidden glass-panel">

        <div class="cv-progresso">
          <div class="cv-progresso-info">
            <span id="cvProgressoTexto">Requisição 1 de 1</span>
            <span id="cvProgressoItens">0 de 0 itens confirmados</span>
          </div>
          <div class="cv-barra-progresso">
            <div id="cvBarraProgresso" class="cv-barra-fill" style="width:0%"></div>
          </div>
        </div>

        <div class="cv-navegacao">
          <button type="button" id="btnCvAnterior" class="btn-glass btn-secondary cv-nav-btn" disabled>
            <i class="fas fa-chevron-left"></i> Anterior
          </button>
          <div class="cv-req-contador">
            <span id="cvReqNumero" class="cv-req-badge">1</span>
          </div>
          <button type="button" id="btnCvProxima" class="btn-glass btn-blue cv-nav-btn">
            Próxima <i class="fas fa-chevron-right"></i>
          </button>
        </div>

        <div id="cvRequisicaoCard"></div>

        <div id="cvResumo" class="cv-resumo hidden">
          <h4><i class="fas fa-clipboard-check"></i> Resumo da Conferência</h4>
          <div id="cvResumoConteudo"></div>
          <div class="form-actions" style="margin-top:16px;flex-wrap:wrap;gap:10px;">
            <button type="button" id="btnCvGerarRelatorio" class="btn-glass btn-green">
              <i class="fas fa-file-pdf"></i> Gerar Relatório PDF
            </button>
            <button type="button" id="btnCvReiniciar" class="btn-glass btn-secondary">
              <i class="fas fa-list-ol"></i> Voltar à Fila
            </button>
          </div>
        </div>

      </div>
      <!-- fim cvConferencia -->

    </div>
    <!-- fim cvConferenciaPagina -->

    <footer class="footer">&copy; 2026 Marquespan. Todos os direitos reservados.</footer>
  </div>

  <script type="module" src="./script/auth-guard.js"></script>
  <script type="module" src="./script/menu.js"></script>
  <script type="module">
    import { inicializarConferenciaPage } from './script/conferencia-carregamento.js?v=20260625-8';
    document.addEventListener('DOMContentLoaded', inicializarConferenciaPage);
  </script>
</body>
</html>
