<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Iniciar Carregamento - Marquespan</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/index.css">
  <link rel="stylesheet" href="css/menu.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/iniciar-carregamento.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
  <div id="menu-container"></div>

  <!-- 🧱 Conteúdo principal -->
  <div class="main-content">
    <header class="header glass-header"><h1><i class="fas fa-truck-loading"></i> Iniciar Carregamento</h1></header>

    <section class="glass-panel">
      <h3><i class="fas fa-clipboard-list"></i> Detalhes do Carregamento</h3>
      <form id="formCabecalhoCarregamento">
        <div class="form-grid">
          <div class="form-group">
            <label for="semana">Semana:</label>
            <input type="text" id="semana" placeholder="Ex.: 24-2026" required class="glass-input">
          </div>
          <div class="form-group">
            <label for="dataCarregamento">Data/Hora:</label>
            <input type="datetime-local" id="dataCarregamento" step="60" required class="glass-input">
          </div>
          <div class="form-group">
            <label for="placa">Placa do Veículo:</label>
            <input type="text" id="placa" placeholder="Selecione um veículo cadastrado" list="placasVeiculosList" required class="glass-input">
            <datalist id="placasVeiculosList"></datalist>
          </div>
          <div class="form-group">
            <label for="motoristaInput">Motorista:</label>
            <input type="text" id="motoristaInput" placeholder="Selecione um motorista ativo" list="motoristasList" required class="glass-input">
            <datalist id="motoristasList"></datalist>
          </div>
          <div class="form-group">
            <label for="conferente">Conferente:</label>
            <input type="text" id="conferente" placeholder="Usuário logado" required disabled class="glass-input">
          </div>
          <div class="form-group">
            <label for="supervisor">Supervisor:</label>
            <input type="text" id="supervisor" placeholder="Nome do Supervisor" list="supervisoresList" class="glass-input">
            <datalist id="supervisoresList"></datalist>
          </div>
        </div>
      </form>
    </section>

    <section class="glass-panel">
      <h3><i class="fas fa-edit"></i> Dados das Requisições</h3>
      <div id="formRequisicao">
        <div class="form-grid">
          <div class="form-group">
            <label for="clienteInput">Cliente:</label>
            <div class="form-group-with-button">
              <input type="text" id="clienteInput" placeholder="Nome ou código" list="clientesList" required class="glass-input">
              <datalist id="clientesList"></datalist>
              <button type="button" id="btnAbrirModalCliente" class="btn-glass btn-blue compact-btn" title="Novo Cliente"><i class="fas fa-plus"></i></button>
            </div>
          </div>
          <div class="form-group">
            <label for="motivoRequisicao">Motivo:</label>
            <select id="motivoRequisicao" class="glass-input">
              <option value="Aumento">Aumento</option>
              <option value="Troca">Troca</option>
              <option value="Aumento+Troca">Aumento+Troca</option>
              <option value="Cliente Novo">Cliente Novo</option>
              <option value="Retirada de Empréstimo">Retirada de Empréstimo</option>
              <option value="Retirada Parcial">Retirada Parcial</option>
              <option value="Retirada Total">Retirada Total</option> 
            </select>
          </div>
        </div>

        <h4 style="margin: 15px 0 10px; color: #555;">Itens da Requisição</h4>
        <div class="table-responsive" style="max-height: 250px;">
          <table id="tabelaItensRequisicaoAtual" class="glass-table data-grid"></table>
        </div>
        <div class="form-actions" style="margin-top: 15px; justify-content: flex-start;">
          <button type="button" id="btnAbrirModalAdicionarItem" class="btn-glass btn-blue">➕ Adicionar Item</button>
          <button type="button" id="btnIncluirRequisicao" class="btn-glass btn-green">➕ Incluir Requisição</button>
        </div>
      </div>
    </section>

    <section class="glass-panel">
      <h3><i class="fas fa-boxes"></i> Itens Carregados (Para Entrega)</h3>
      <div class="table-responsive">
        <table id="tabelaItensCarregados" class="glass-table data-grid"></table>
      </div>
    </section>

    <section class="glass-panel">
      <h3><i class="fas fa-exchange-alt"></i> Itens de Troca e Retirada</h3>
      <div class="table-responsive">
        <table id="tabelaItensTrocaRetirada" class="glass-table data-grid"></table>
      </div>
    </section>

    <section class="glass-panel">
      <h3><i class="fas fa-chart-pie"></i> Resumo Geral do Carregamento</h3>
      <div class="table-responsive">
        <table id="tabelaResumo" class="glass-table data-grid">
        </table>
      </div>
    </section>

    <section class="form-actions" style="margin-bottom: 30px;">
        <button type="button" id="btnSalvarCarregamento" class="btn-glass btn-green">🚚 Salvar Carregamento Completo</button>
        <button type="button" id="btnGerarPDF" class="btn-glass btn-red">📄 Gerar PDF</button>
    </section>

    <footer class="footer">
      &copy; 2026 Marquespan. Todos os direitos reservados.
    </footer>
  </div>

  <!-- Modal Cadastro Cliente -->
  <div id="modalCliente" class="modal-backdrop hidden">
    <div class="glass-modal">
      <div class="modal-header">
        <h3><i class="fas fa-users"></i> Cadastrar Novo Cliente</h3>
        <button class="close-button" id="fecharModalCliente">&times;</button>
      </div>
      <div class="modal-body">
        <form id="formNovoCliente">
          <div class="form-grid">
            <div class="form-group"><label>Código</label><input type="text" id="codClienteModal" required class="glass-input"></div>
            <div class="form-group"><label>Nome</label><input type="text" id="nomeClienteModal" required class="glass-input"></div>
            <div class="form-group"><label>Cidade</label><input type="text" id="cidadeClienteModal" required class="glass-input"></div>
            <div class="form-group"><label>Estado</label><input type="text" id="estadoClienteModal" required class="glass-input"></div>
          </div>
          <div class="form-actions" style="margin-top: 20px;">
            <button type="submit" class="btn-glass btn-green">✅ Salvar Cliente</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Modal Adicionar Item -->
  <div id="modalAdicionarItem" class="modal-backdrop hidden">
    <div class="glass-modal" style="max-width: 800px;">
      <div class="modal-header">
        <h3><i class="fas fa-boxes"></i> Selecionar Itens</h3>
        <button class="close-button" id="fecharModalAdicionarItem">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group" style="margin-bottom: 15px;">
          <input type="text" id="buscaItens" placeholder="🔍 Buscar itens..." class="glass-input">
        </div>
        <div class="table-responsive" style="max-height: 400px;">
          <table id="tabelaItensModal" class="glass-table data-grid">
            <thead><tr><th style="width: 80px;">QTD</th><th>Item</th><th style="width: 150px;">Modelo</th></tr></thead>
            <tbody id="corpoTabelaItensModal"></tbody>
          </table>
        </div>
        <div class="form-actions" style="margin-top: 20px;">
          <button type="button" id="btnAdicionarItensSelecionados" class="btn-glass btn-green">➕ Adicionar Itens</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="./script/auth-guard.js"></script>
  <script type="module" src="./script/menu.js"></script>
  <script type="module" src="./script/iniciar-carregamento.js?v=20260610-6"></script>
</body>
</html>
