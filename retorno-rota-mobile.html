<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Retorno de Rota (Mobile) - Logística</title>
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/retorno-rota-mobile.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="logo.png" type="image/png">
</head>
<body>
    <div class="mobile-container">
        <header class="mobile-header">
            <h1><i class="fas fa-route"></i> Retorno de Rota</h1>
            <a href="retorno-rota.html" class="back-button"><i class="fas fa-chevron-left"></i> Voltar</a>
        </header>

        <main class="mobile-main">
            <div class="filters-bar">
                <div class="form-group">
                    <label for="dataRetornoMobile">Data</label>
                    <input type="date" id="dataRetornoMobile" class="glass-input">
                </div>
                <div class="form-group">
                    <label for="buscaMobile">Buscar</label>
                    <input type="search" id="buscaMobile" class="glass-input" placeholder="Placa, Motorista, Rota...">
                </div>
            </div>

            <div id="listaRetornoMobile" class="card-list">
                <!-- Cards serão inseridos aqui via JS -->
            </div>
        </main>
    </div>

    <!-- Modal de Edição de Retorno -->
    <div id="modalRetorno" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Registrar Retorno</h3>
                <button class="close-button">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="modalHoraMotorista">Horário de Retorno do Motorista</label>
                    <input type="time" id="modalHoraMotorista" class="glass-input">
                </div>
                <div class="form-group">
                    <label for="modalObs">Observações Gerais</label>
                    <textarea id="modalObs" class="glass-input" rows="3"></textarea>
                </div>
                <div class="botoes-acao-modal" style="display: flex; gap: 10px; margin-top: 15px;">
                    <button id="btnAbrirModalMateriais" class="btn-glass btn-blue" style="flex: 1;">
                        <i class="fas fa-box-open"></i> Materiais
                    </button>
                    <button id="btnAbrirModalDevolucoes" class="btn-glass btn-orange" style="flex: 1;">
                        <i class="fas fa-undo-alt"></i> Devoluções
                    </button>
                </div>
            </div>
            <div class="modal-footer">
                <button id="btnSalvarRetorno" class="btn-custom btn-green">Salvar</button>
            </div>
        </div>
    </div>

    <!-- Modal para Detalhes de Materiais (reutilizado) -->
     <div id="modalMateriais" class="modal-overlay hidden">
         <div class="modal-content" style="max-width: 500px;">
             <div class="modal-header">
                 <h3>Materiais Retornados</h3>
                 <button class="close-button">&times;</button>
             </div>
             <div class="modal-body">
                 <div class="form-grid-2-cols">
                     <div class="form-group">
                         <label for="matCarrinhos">Carrinhos</label>
                         <input type="number" id="matCarrinhos" class="glass-input">
                     </div>
                     <div class="form-group">
                         <label for="matTemPaletes">Houve retorno de Paletes?</label>
                         <select id="matTemPaletes" class="glass-input">
                             <option value="false">Não</option>
                             <option value="true">Sim</option>
                         </select>
                     </div>
                 </div>
 
                 <!-- Detalhes dos Paletes (inicialmente oculto) -->
                 <div id="paletes-details-mobile" class="hidden" style="margin-top: 1rem; border-top: 1px solid #eee; padding-top: 1rem;">
                     <div class="form-grid-2-cols">
                         <div class="form-group">
                             <label for="matMadeira">Madeira (Qtd)</label>
                             <input type="number" id="matMadeira" class="glass-input">
                         </div>
                         <div class="form-group">
                             <label for="matPlastico">Plástico (Qtd)</label>
                             <input type="number" id="matPlastico" class="glass-input">
                         </div>
                         <div class="form-group">
                             <label for="matCaixaBranca">Caixa Branca (Qtd)</label>
                             <input type="number" id="matCaixaBranca" class="glass-input">
                         </div>
                     </div>
                 </div>
 
                 <div class="form-group form-group-full" style="margin-top: 1rem;">
                     <label for="matObsCarrinhos">Obs. Carrinhos</label>
                     <input type="text" id="matObsCarrinhos" class="glass-input">
                 </div>
             </div>
             <div class="modal-footer">
                 <button id="btnSalvarMateriais" class="btn-custom btn-blue">Confirmar Materiais</button>
             </div>
         </div>
     </div>
 
     <!-- Modal para Detalhes de Devolução -->
     <div id="modalDevolucoes" class="modal-overlay hidden">
         <div class="modal-content">
             <div class="modal-header">
                 <h3>Lançar Devoluções da Rota</h3>
                 <button class="close-button">&times;</button>
             </div>
             <div class="modal-body">
                 <div class="supervisor-section" style="padding-bottom: 15px; margin-bottom: 15px; border-bottom: 1px solid #eee;">
                    <div class="form-group">
                         <label for="supervisorCienteDevolucao">Supervisor Ciente?</label>
                         <select id="supervisorCienteDevolucao" class="glass-input">
                             <option value="false">Não</option>
                             <option value="true">Sim</option>
                         </select>
                     </div>
                     <div class="form-group" style="margin-top: 10px;">
                         <label for="nomeSupervisorDevolucao">Nome do Supervisor</label>
                         <select id="nomeSupervisorDevolucao" class="glass-input">
                             <!-- Options will be populated by JS -->
                         </select>
                     </div>
                 </div>
                 <div class="tab-container">
                     <button class="tab-link active" data-tab="tab-cliente-1">Cliente 1</button>
                     <button class="tab-link" data-tab="tab-cliente-2">Cliente 2</button>
                     <button class="tab-link" data-tab="tab-cliente-3">Cliente 3</button>
                     <button class="tab-link" data-tab="tab-cliente-4">Cliente 4</button>
                 </div>
                 <div id="tab-cliente-1" class="tab-content active"></div>
                 <div id="tab-cliente-2" class="tab-content"></div>
                 <div id="tab-cliente-3" class="tab-content"></div>
                 <div id="tab-cliente-4" class="tab-content"></div>
             </div>
             <div class="modal-footer">
                 <button id="btnSalvarDevolucoes" class="btn-custom btn-green">Salvar e Fechar</button>
             </div>
         </div>
     </div>

    <script type="module" src="script/retorno-rota-mobile.js"></script>
</body>
</html>
