<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Cadastro Comodato - Marquespan</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/index.css">
  <link rel="stylesheet" href="css/menu.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/cadastro_comodato.css">
</head>
<body>
  <div id="menu-container"></div>

  <div class="main-content">
    <header class="header glass-header">
      <h1><i class="fas fa-handshake"></i> Cadastro de Comodato</h1>
    </header>

    <div class="painel-botoes">
      <button class="painel-btn active" data-secao="sec-cli">Cadastro de Clientes</button>
      <button class="painel-btn" data-secao="sec-req">Gerar Requisição</button>
    </div>

    <!-- Seção Clientes -->
    <section id="sec-cli" class="section glass-panel">
      <h3><i class="fas fa-user-plus"></i> Cadastro de Cliente</h3>
      <form id="formCliente">
        <div class="comodato-grid-layout">
            
            <!-- Card 1: Controle -->
            <div class="glass-panel-inner">
              <h4><i class="fas fa-info-circle"></i> Controle</h4>
              <div class="form-grid">
                <div class="form-group"><label>Data</label><input type="date" id="cliData" class="glass-input"></div>
                <div class="form-group"><label>Rota</label><input type="text" id="cliRota" class="glass-input"></div>
                <div class="form-group"><label>Status</label>
                  <select id="cliStatus" class="glass-input">
                    <option value="PENDENTE">PENDENTE</option>
                    <option value="APROVADO">APROVADO</option>
                    <option value="NEGADO">NEGADO</option>
                  </select>
                </div>
                <div class="form-group"><label>Supervisor</label><input type="text" id="cliSupervisor" class="glass-input" placeholder="Nome do Supervisor"></div>
              </div>
            </div>

            <!-- Card 2: Identificação -->
            <div class="glass-panel-inner">
              <h4><i class="fas fa-id-card"></i> Identificação</h4>
              <div class="form-grid">
                <div class="form-group"><label>Razão Social</label><input type="text" id="cliRazao" required class="glass-input"></div>
                <div class="form-group"><label>Nome Fantasia</label><input type="text" id="cliFantasia" class="glass-input"></div>
                <div class="form-group"><label>CNPJ</label><input type="text" id="cliCnpj" class="glass-input"></div>
                <div class="form-group"><label>Inscrição Estadual</label><input type="text" id="cliIe" class="glass-input"></div>
                <div class="form-group"><label>CNAE</label><input type="text" id="cliCnae" class="glass-input"></div>
              </div>
            </div>

            <!-- Card 3: Contato e Localização -->
            <div class="glass-panel-inner">
              <h4><i class="fas fa-map-marker-alt"></i> Localização e Contato</h4>
              <div class="form-grid">
                <div class="form-group"><label>Contato</label><input type="text" id="cliContato" class="glass-input"></div>
                <div class="form-group"><label>Email</label><input type="email" id="cliEmail" class="glass-input"></div>
                <div class="form-group"><label>Município</label><input type="text" id="cliMunicipio" class="glass-input"></div>
                <div class="form-group"><label>Endereço Completo</label><input type="text" id="cliEndereco" class="glass-input"></div>
              </div>
            </div>

            <!-- Card 4: Ações -->
            <div class="glass-panel-inner actions-panel">
              <h4><i class="fas fa-cogs"></i> Ações</h4>
              <div class="form-actions-vertical">
                <button type="submit" class="btn-glass btn-green"><i class="fas fa-save"></i> Salvar Cliente</button>
                <button type="button" id="btnLimparCliente" class="btn-glass btn-blue"><i class="fas fa-eraser"></i> Limpar</button>
              </div>
            </div>

            <!-- Linha de Baixo: Documentação (Ocupa as 4 colunas) -->
            <div class="glass-panel-inner card-full-width">
              <h4><i class="fas fa-camera"></i> Documentação Fotográfica</h4>
              <div class="form-grid" style="grid-template-columns: 1fr;">
                <div class="form-group"><label>Fotos (Máx 5)</label><input type="file" id="cliFotos" multiple accept="image/*" class="glass-input"></div>
              </div>
              <div id="previewFotos" class="preview-container"></div>
            </div>

        </div>
      </form>

      <div class="table-responsive">
        <table class="glass-table">
          <thead>
            <tr>
              <th>Data</th>
              <th>Usuário</th>
              <th>Razão Social</th>
              <th>Fantasia</th>
              <th>CNPJ</th>
              <th>Rota</th>
              <th>Status</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="tableBodyClientes"></tbody>
        </table>
      </div>
    </section>

    <!-- Seção Requisição -->
    <section id="sec-req" class="section glass-panel hidden">
      <h3><i class="fas fa-file-invoice"></i> Gerar Requisição de Comodato</h3>
      <div id="formRequisicao">
        <div class="form-grid">
          <div class="form-group">
            <label>Cliente</label>
            <input type="text" id="reqCliente" list="listaClientesReq" class="glass-input" placeholder="Buscar cliente...">
            <datalist id="listaClientesReq"></datalist>
          </div>
          <div class="form-group">
            <label>Motivo</label>
            <select id="reqMotivo" class="glass-input">
              <option value="NOVO_CONTRATO">NOVO CONTRATO</option>
              <option value="SUBSTITUICAO">SUBSTITUIÇÃO</option>
              <option value="AMPLIACAO">AMPLIAÇÃO</option>
              <option value="MANUTENCAO">MANUTENÇÃO</option>
            </select>
          </div>
        </div>

        <div class="table-responsive" style="margin-top: 20px;">
          <table class="glass-table" id="tableReqItens">
            <thead>
              <tr>
                <th>Item / Equipamento</th>
                <th style="text-align: center; width: 100px;">Qtd</th>
                <th style="text-align: center; width: 80px;">Ações</th>
              </tr>
            </thead>
            <tbody id="tbodyReqItens"></tbody>
          </table>
        </div>

        <div class="form-actions" style="margin-top: 20px; justify-content: flex-start;">
          <button type="button" id="btnAddItemReq" class="btn-glass btn-blue">➕ Adicionar Linha</button>
          <button type="button" id="btnSalvarRequisicao" class="btn-glass btn-green" style="margin-left: auto;">✅ Gerar Requisição</button>
        </div>
      </div>
    </section>
  </div>

  <script type="module" src="script/menu.js"></script>
  <script src="script/cadastro_comodato.js"></script>
</body>
</html>
