<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Tacógrafo - Marquespan</title>
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/tacografo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Biblioteca para ler arquivos Excel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <!-- Bibliotecas para geração de PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
</head>
<body>
    <div id="menu-container"></div>

    <main class="main-content">
        <header class="header glass-header">
            <h1><i class="fas fa-stopwatch"></i> Controle de Tacógrafo</h1>
        </header>

        <div class="tacografo-top-grid">
            <!-- Filtros de Busca -->
            <section class="glass-panel">
                <h3><i class="fas fa-filter"></i> Filtros de Busca</h3>
                <div class="filters-container">
                    <div class="form-group-filter">
                        <label for="filterFilial">Filial</label>
                        <select id="filterFilial" class="glass-input">
                            <option value="">Todas</option>
                        </select>
                    </div>
                    <div class="form-group-filter">
                        <label for="searchTacografo">Buscar Veículo</label>
                        <input type="text" id="searchTacografo" class="glass-input" placeholder="Placa, modelo ou renavan...">
                    </div>
                    <div class="form-group-filter" style="min-width: 220px;">
                        <label>Status</label>
                        <div class="custom-multiselect" style="position: relative;">
                            <div id="filterStatusDisplay" class="glass-input multiselect-display" style="cursor: pointer; display: flex; justify-content: space-between; align-items: center; color: #000;">
                                <span id="filterStatusText">Todos</span> <i class="fas fa-chevron-down"></i>
                            </div>
                            <div id="filterStatusOptions" class="glass-dropdown hidden" style="position: absolute; z-index: 1000; width: 100%; background-color: #fff; max-height: 200px; overflow-y: auto; border: 1px solid #ccc; border-radius: 4px; padding: 5px; top: 100%; color: #000;">
                                <label style="display: block; padding: 5px; cursor: pointer;"><input type="checkbox" class="status-checkbox" value="Vencido"> Vencido</label>
                                <label style="display: block; padding: 5px; cursor: pointer;"><input type="checkbox" class="status-checkbox" value="Preliminar"> Preliminar</label>
                                <label style="display: block; padding: 5px; cursor: pointer;"><input type="checkbox" class="status-checkbox" value="Em Dia"> Em Dia</label>
                                <label style="display: block; padding: 5px; cursor: pointer;"><input type="checkbox" class="status-checkbox" value="Dispensado"> Dispensado</label>
                            </div>
                        </div>
                    </div>
                    <div class="form-group-filter date-filter-group">
                        <label for="filterVencIni">Vencimento De</label>
                        <input type="date" id="filterVencIni" class="glass-input">
                    </div>
                    <div class="form-group-filter date-filter-group">
                        <label for="filterVencFim">Vencimento Até</label>
                        <input type="date" id="filterVencFim" class="glass-input">
                    </div>
                </div>
            </section>

            <!-- Ações -->
            <section class="glass-panel acoes-panel">
                <h3><i class="fas fa-cogs"></i> Ações</h3>
                <div class="acoes-grid">
                    <button id="btnAtualizar" class="btn-glass btn-blue">
                        <i class="fas fa-sync-alt"></i> Atualizar
                    </button>
                    <button id="btnImportar" class="btn-glass btn-green">
                        <i class="fas fa-file-import"></i> Importar XLSX
                    </button>
                    <button id="btnExportarPDF" class="btn-glass btn-red">
                        <i class="fas fa-file-pdf"></i> Exportar PDF
                    </button>
                    <input type="file" id="fileImportar" accept=".xlsx, .xls" class="hidden">
                </div>
            </section>
        </div>

        <section class="glass-panel">
            <div class="panel-header">
                <h2><i class="fas fa-list"></i> Lista de Veículos</h2>
                <div class="status-legend-container">
                    <span class="badge status-pendente">Vencido: <span id="count-pendente">0</span></span>
                    <span class="badge status-preliminar">Preliminar: <span id="count-preliminar">0</span></span>
                    <span class="badge status-em-dia">Em Dia: <span id="count-em-dia">0</span></span>
                    <span class="badge status-dispensado">Dispensado: <span id="count-dispensado">0</span></span>
                </div>
            </div>
            <div class="table-responsive">
                <table class="data-grid" id="gridTacografo">
                    <thead>
                        <tr>
                            <th data-sort="filial" class="sortable">Filial <i class="fas fa-sort"></i></th>
                            <th data-sort="placa" class="sortable">Placa <i class="fas fa-sort"></i></th>
                            <th data-sort="modelo" class="sortable">Modelo <i class="fas fa-sort"></i></th>
                            <th data-sort="renavan" class="sortable">Renavan <i class="fas fa-sort"></i></th>
                            <th data-sort="tipo" class="sortable">Tipo <i class="fas fa-sort"></i></th>
                            <th data-sort="data_emissao" class="sortable">Data Emissão <i class="fas fa-sort"></i></th>
                            <th data-sort="data_vencimento" class="sortable">Dt. Vencimento <i class="fas fa-sort"></i></th>
                            <th data-sort="guia_gru" class="sortable">Guia GRU <i class="fas fa-sort"></i></th>
                            <th data-sort="status" class="sortable">Status <i class="fas fa-sort"></i></th>
                            <th>OBS</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tbodyTacografo">
                        <!-- Dados carregados via JS -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <footer class="footer">
        &copy; 2025 GTSYSTEM - Marquespan. Todos os direitos reservados.
    </footer>

    <script type="module" src="script/menu.js"></script>
    <script type="module" src="script/tacografo.js"></script>
</body>
</html>
