<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestão de Pedágios - Marquespan</title>
  <link rel="stylesheet" href="css/index.css" />
  <link rel="stylesheet" href="css/pedagio.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
</head>
<body>
  <div id="menu-container"></div>

  <main class="main-content">
      <header class="header glass-header" style="display: flex; justify-content: space-between; align-items: center;">
        <h1><i class="fas fa-road"></i> Gestão de Pedágios</h1>
        <!-- <div id="usuario-logado" style="font-weight: bold; color: var(--primary-color);"></div> -->
      </header>
      <div class="painel-navegacao" role="tablist" id="menu-pedagio">
        <button class="painel-btn active" data-secao="sectionLancamento">
          <i class="fas fa-list"></i> Lançamentos
        </button>
        <button class="painel-btn" data-secao="sectionImportacao">
          <i class="fas fa-file-import"></i> Importar Planilha
        </button>
        <button class="painel-btn" data-secao="sectionEmpresas">
          <i class="fas fa-building"></i> Empresas de Pedágio
        </button>
      </div>

      <!-- SEÇÃO: LANÇAMENTOS -->
      <section id="sectionLancamento" class="glass-panel">
          <div class="panel-header-actions">
            <h3><i class="fas fa-history"></i> Histórico de Passagens</h3>
            <button id="btnAdicionarLancamento" class="btn-glass btn-blue"><i class="fas fa-plus"></i> Novo Lançamento</button>
          </div>
          
          <div class="filters-container glass-panel" style="margin-bottom: 20px; padding: 15px; display: flex; gap: 15px; flex-wrap: wrap; align-items: flex-end;">
              <div class="form-group" style="flex: 1; min-width: 150px;">
                  <label>De:</label>
                  <input type="date" id="filtroDataInicialLancamento" class="glass-input">
              </div>
              <div class="form-group" style="flex: 1; min-width: 150px;">
                  <label>Até:</label>
                  <input type="date" id="filtroDataFinalLancamento" class="glass-input">
              </div>
              <div class="form-group" style="flex: 2; min-width: 200px;">
                  <label>Buscar Placa:</label>
                  <input type="text" id="searchPlaca" class="glass-input" placeholder="ABC1234">
              </div>
              <button id="btnFiltrarLancamentos" class="btn-glass btn-blue" style="height: 38px;"><i class="fas fa-search"></i> Filtrar</button>
          </div>

          <div class="table-responsive">
            <table class="glass-table data-grid">
              <thead>
                <tr>
                  <th data-sort="usuario_nome">Usuário <i class="fas fa-sort"></i></th>
                  <th data-sort="data_hora_passagem">Data/Hora <i class="fas fa-sort"></i></th>
                  <th data-sort="placa">Placa <i class="fas fa-sort"></i></th>
                  <th>Tipo</th>
                  <th data-sort="motorista">Motorista <i class="fas fa-sort"></i></th>
                  <th data-sort="rota">Rota <i class="fas fa-sort"></i></th>
                  <th data-sort="categoria_eixos">Eixos Cobrado <i class="fas fa-sort"></i></th>
                  <th data-sort="rodovia">Rodovia <i class="fas fa-sort"></i></th>
                  <th data-sort="praca">Praça <i class="fas fa-sort"></i></th>
                  <th data-sort="valor">Valor <i class="fas fa-sort"></i></th>
                  <th>Ações</th>
                </tr>
              </thead>
              <tbody id="tableBodyLancamentos"></tbody>
            </table>
          </div>
      </section>

      <!-- SEÇÃO: IMPORTAÇÃO -->
      <section id="sectionImportacao" class="glass-panel hidden">
          <div class="panel-header-actions">
            <h3><i class="fas fa-upload"></i> Importação em Massa</h3>
          </div>
          <form id="formImportacaoPedagio" class="glass-panel" style="padding: 20px; max-width: 600px; margin: 0 auto;">
              <div class="form-group">
                  <label>Empresa de Pedágio:</label>
                  <select id="empresaPedagioSelect" class="glass-input" required></select>
              </div>
              <div class="form-group">
                  <label>Filial:</label>
                  <select id="filialImportacaoPedagio" class="glass-input" required></select>
              </div>
              <div class="form-group">
                  <label>Arquivo (XLSX/CSV):</label>
                  <input type="file" id="arquivoImportacao" class="glass-input" accept=".xlsx, .xls, .csv" required>
              </div>
              <div id="importProgressContainer" class="hidden" style="margin: 15px 0;">
                  <div class="progress-bar-container" style="background: #eee; height: 10px; border-radius: 5px;">
                      <div id="importProgressBar" style="width: 0%; background: var(--primary-color); height: 100%; border-radius: 5px; transition: width 0.3s;"></div>
                  </div>
                  <p id="importProgressPercent" style="text-align: right; font-size: 0.8rem; margin-top: 5px;">0%</p>
              </div>
              <div id="importStatus" style="margin-top: 15px;"></div>
              <button type="submit" class="btn-glass btn-green btn-block" style="margin-top: 20px;">
                  <i class="fas fa-check"></i> Iniciar Importação
              </button>
          </form>
      </section>

      <!-- SEÇÃO: EMPRESAS -->
      <section id="sectionEmpresas" class="glass-panel hidden">
          <div class="panel-header-actions">
            <h3><i class="fas fa-building"></i> Configuração de Layouts</h3>
          </div>
          <form id="formEmpresaPedagio" class="form-grid">
              <input type="hidden" id="empresaPedagioEditingId">
              <div class="form-group">
                  <label>Nome da Empresa:</label>
                  <input type="text" id="empresaPedagioNome" class="glass-input" required placeholder="Ex: SEM PARAR">
              </div>
              <div class="form-group">
                  <label>Valor Mensalidade (R$):</label>
                  <input type="number" id="empresaPedagioMensalidade" step="0.01" class="glass-input" placeholder="0.00">
              </div>
              <div class="form-group">
                  <label>Layout Config (JSON):</label>
                  <textarea id="empresaPedagioLayout" class="glass-input" rows="10" placeholder='{"DATA":"DATA","HORA":"HORA","PLACA":"PLACA","FILIAL":"FILIAL","ROTA":"ROTA","MOTORISTA":"MOTORISTA","CATEGORIA":"CATEGORIA","RODOVIA":"RODOVIA","PRACA":"PRAÇA","VALOR":"VALOR"}'></textarea>
              </div>
              <div class="form-actions">
                  <button type="submit" class="btn-glass btn-green">Salvar Empresa</button>
                  <button type="button" id="btnLimparEmpresaPedagio" class="btn-glass">Limpar</button>
              </div>
          </form>
          <table class="glass-table data-grid" style="margin-top: 20px;">
              <thead>
                  <tr>
                      <th>Nome</th>
                      <th>Mensalidade</th>
                      <th>Configuração</th>
                      <th>Ações</th>
                  </tr>
              </thead>
              <tbody id="tableBodyEmpresasPedagio"></tbody>
          </table>
      </section>
  </main>

  <!-- Modal Lançamento -->
  <div id="modalLancamento" class="modal-backdrop hidden">
      <div class="modal-content glass-panel" style="width: 640px; max-width: 95vw;">
          <div class="modal-header">
              <h3>Novo Lançamento</h3>
              <button class="close-button">&times;</button>
          </div>
          <form id="formLancamentoPedagio" class="form-grid">
              <div class="form-group">
                  <label>Veículo (Placa):</label>
                  <input type="text" id="lancamentoPlaca" list="veiculosList" class="glass-input" required>
                  <datalist id="veiculosList"></datalist>
              </div>
              <div class="form-group">
                  <label>Empresa Operadora:</label>
                  <select id="lancamentoEmpresa" class="glass-input" required></select>
              </div>
              <div class="form-group">
                  <label>Filial:</label>
                  <select id="lancamentoFilial" class="glass-input" required></select>
              </div>
              <div class="form-row-duplo">
                  <div class="form-group">
                      <label>Tipo:</label>
                      <input type="text" id="lancamentoTipo" class="glass-input" readonly>
                  </div>
                  <div class="form-group">
                      <label>Eixos Cobrado:</label>
                      <input type="number" id="lancamentoCateg" class="glass-input" min="1">
                  </div>
              </div>
              <div class="form-group">
                  <label>Data/Hora Passagem:</label>
                  <input type="datetime-local" id="lancamentoDataHora" class="glass-input" required>
              </div>
              <div class="form-row-duplo">
                  <div class="form-group">
                      <label>Motorista:</label>
                      <input type="text" id="lancamentoMotorista" list="motoristasList" class="glass-input">
                      <datalist id="motoristasList"></datalist>
                  </div>
                  <div class="form-group">
                      <label>Rota:</label>
                      <input type="text" id="lancamentoRota" list="rotasList" class="glass-input">
                      <datalist id="rotasList"></datalist>
                  </div>
              </div>
              <div class="form-row-duplo">
                  <div class="form-group"><label>Rodovia:</label><input type="text" id="lancamentoRodovia" class="glass-input"></div>
                  <div class="form-group"><label>Praça:</label><input type="text" id="lancamentoPraca" class="glass-input"></div>
              </div>
              <div class="form-group">
                  <label>Valor (R$):</label>
                  <input type="number" step="0.01" id="lancamentoValor" class="glass-input" required>
              </div>
              <div class="form-actions">
                  <button type="button" id="btnGoogleMaps" class="btn-glass btn-blue"><i class="fas fa-map-marked-alt"></i> Ver no Mapa</button>
                  <button type="submit" class="btn-glass btn-green">Salvar</button>
              </div>
          </form>
      </div>
  </div>

    <footer class="footer">
        &copy; 2025 GTSYSTEM - Marquespan. Todos os direitos reservados.
    </footer>

  <script type="module" src="./script/auth-guard.js"></script>
  <script type="module" src="./script/menu.js" defer></script>
  <script type="module" src="./script/pedagio.js" defer></script>
</body>
</html>
