<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mapa de Rotas - Marquespan</title>
  <!-- Estilos existentes -->
  <link rel="stylesheet" href="css/index.css">
  <link rel="stylesheet" href="css/compras.css"> <!-- Reutilizando estilos -->
  <!-- Estilo específico do mapa -->
  <link rel="stylesheet" href="css/mapa.css">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Leaflet (Biblioteca de Mapa) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <!-- Plugins para Busca e Rotas -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
  <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
  <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
</head>
<body>

  <div id="menu-container"></div>

  <main class="main-content">
    <header class="header glass-header">
      <h1><i class="fas fa-map-marked-alt"></i> Mapa de Rotas</h1>
    </header>

    <div class="map-layout">
      <!-- Coluna da Esquerda: Painéis de Controle -->
      <aside class="map-sidebar">
        
        <!-- Painel para Criar/Listar Rotas -->
        <div class="glass-panel">
          <h3><i class="fas fa-route"></i> Rotas</h3>
          <form id="formNovaRota" class="form-grid" style="display: flex; flex-direction: column; gap: 10px;">
            <input type="text" id="supervisorNovaRota" placeholder="Supervisor da Rota" class="glass-input">
            <div style="display: flex; gap: 10px; width: 100%;">
                <input type="text" id="nomeNovaRota" placeholder="Nome da Rota" class="glass-input" style="flex: 1;" required>
                <input type="color" id="corNovaRota" value="#3388ff" title="Cor da Rota" style="height: 40px; width: 50px; padding: 0; border: none; background: none; cursor: pointer;">
                <button type="submit" class="btn-glass btn-green compact-btn" title="Salvar Rota" style="width: 50px;"><i class="fas fa-plus"></i></button>
            </div>
            <input type="text" id="enderecoNovaRota" placeholder="Endereço / Localidade (Opcional)" class="glass-input">
          </form>
          <hr>
          <ul id="listaRotas" class="item-list">
            <!-- Rotas serão carregadas aqui via JS -->
            <li>Carregando rotas...</li>
          </ul>
        </div>

        <!-- Painel para Pontos da Rota Selecionada -->
        <div id="painelPontos" class="glass-panel hidden">
          <h3 id="tituloPainelPontos"><i class="fas fa-map-marker-alt"></i> Pontos da Rota</h3>
          <div id="rotaInfo" class="glass-panel-inner" style="margin-bottom: 10px; padding: 10px; text-align: center; display: none; background-color: rgba(0, 105, 55, 0.1); border: 1px solid #006937; border-radius: 8px;">
             <i class="fas fa-road"></i> <strong>Total:</strong> <span id="distanciaRota" style="font-size: 1.1em; font-weight: bold;">0 km</span> 
             <span style="margin: 0 5px;">•</span> <i class="fas fa-clock"></i> <span id="tempoRota">0 min</span>
          </div>
          <p class="instrucao-mapa">Clique no mapa para adicionar um novo ponto.</p>

          <!-- Painel de Roteirização Inteligente (Movido para cá) -->
          <div class="glass-panel-inner" style="margin-top: 15px; margin-bottom: 15px; padding: 15px; background-color: rgba(0,0,0,0.05);">
            <h4 style="margin-top: 0; margin-bottom: 10px; font-size: 1em; color: #006937;"><i class="fas fa-robot"></i> Roteirização Inteligente</h4>
            <div class="form-grid" style="display: flex; flex-direction: column; gap: 10px;">
              <input type="text" id="inputOrigem" placeholder="Ponto Inicial (Origem)" class="glass-input">
              <input type="text" id="inputDestino" placeholder="Ponto Final (Destino)" class="glass-input">
              <button id="btnTracarRotaInteligente" class="btn-glass btn-blue compact-btn" style="width: 100%; display: flex; align-items: center; justify-content: center; gap: 5px;">
                <i class="fas fa-route"></i> Traçar Melhor Rota
              </button>
            </div>
          </div>

          <button id="btnFecharRota" class="btn-glass btn-blue compact-btn" style="width: 100%; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 5px;">
            <i class="fas fa-undo"></i> Finalizar Rota ao Ponto Inicial
          </button>
          <ul id="listaPontos" class="item-list">
            <!-- Pontos da rota selecionada serão carregados aqui -->
          </ul>
        </div>

      </aside>

      <!-- Coluna da Direita: O Mapa -->
      <div class="map-container">
        <div id="map"></div>
      </div>
    </div>
  </main>

  <!-- Scripts -->
  <script type="module" src="./script/menu.js"></script>
  <script type="module" src="./script/mapa.js"></script>
</body>
</html>
